<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>已實現損益</title>
  <style>
    :root {
      --bg: #0A0C10;
      --surface: #12151C;
      --surface-2: #171B24;
      --surface-3: #1D2330;
      --border: #232936;
      --border-strong: #2E3646;
      --text: #E7EBF2;
      --text-2: #9AA4B2;
      --text-3: #5C6675;
      --accent: #E8C158;
      --accent-soft: rgba(232,193,88,0.10);
      --link: #6CA8FF;
      --up: #F0544C;
      --up-bright: #FF7B72;
      --up-bg: #1D0F0E;
      --dn: #3FBF7F;
      --dn-bright: #5CD99A;
      --dn-bg: #0C1B14;
      --warn: #F5A524;
      --risk: #F0544C;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    ::selection { background: rgba(108,168,255,0.28); }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      padding: 12px 22px;
      background: rgba(10,12,16,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      z-index: 20;
    }
    .brand { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: 0.08em; white-space: nowrap; }
    .brand-page { font-size: 13px; font-weight: 500; color: var(--text-3); margin-left: 2px; }
    .site-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      color: var(--text-2); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 999px;
      background: transparent;
      white-space: nowrap; transition: all 0.15s ease;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
    .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); pointer-events: none; }

    .date-badge { font-size: 12px; color: var(--text-3); white-space: nowrap; }

    /* filter buttons */
    .filter-group { display: flex; gap: 6px; align-items: center; }
    .filter-btn {
      background: var(--surface-2); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.02em; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--border-strong); color: var(--text); transform: translateY(-1px); }
    .filter-btn.act-all  { background: rgba(108,168,255,0.10); border-color: var(--link); color: var(--link); }
    .filter-btn.act-win  { background: rgba(240,84,76,0.10); border-color: var(--up); color: var(--up-bright); }
    .filter-btn.act-loss { background: rgba(63,191,127,0.10); border-color: var(--dn); color: var(--dn-bright); }

    /* search */
    .search-box {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px;
      color: var(--text); font-size: 13px; padding: 4px 12px; outline: none;
      width: 130px; transition: border-color 0.15s ease;
    }
    .search-box::placeholder { color: var(--text-3); }
    .search-box:focus { border-color: var(--link); box-shadow: 0 0 0 3px rgba(108,168,255,0.15); }

    /* stats pills */
    .stats-pills {
      margin-left: auto;
      display: flex; gap: 20px; align-items: center;
      font-size: 12px; color: var(--text-2); flex-wrap: wrap;
    }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-num  { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; }
    .stat-num.pos { color: var(--up); }
    .stat-num.neg { color: var(--dn); }
    .stat-lbl  { font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; }

    /* ── Table area ── */
    #table-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }
    #table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
    #table-wrap::-webkit-scrollbar-track { background: transparent; }
    #table-wrap::-webkit-scrollbar-thumb { background: #2A3140; border-radius: 4px; }
    #table-wrap::-webkit-scrollbar-thumb:hover { background: #38424F; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; font-variant-numeric: tabular-nums; }

    thead th {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface-2);
      color: var(--text-3); font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 6px 10px -8px rgba(0,0,0,0.75);
      white-space: nowrap; text-align: center;
      cursor: pointer; user-select: none;
    }
    thead th:hover { color: var(--text-2); }
    thead th .sort-arrow { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-arrow { opacity: 1; color: var(--link); }
    thead th.no-sort { cursor: default; }
    thead th.no-sort:hover { color: var(--text-3); }

    tbody tr {
      border-bottom: 1px solid #1A1F29;
      transition: background 0.12s ease;
      cursor: default;
      border-left: 3px solid transparent;
    }
    tbody tr.hidden-row { display: none; }

    /* 行左邊框顏色 */
    /* 台股慣例：賺=紅底、虧=綠底（2026-07-22 修正，不可反轉） */
    tbody tr.row-win  { background: var(--up-bg); border-left-color: var(--up); }
    tbody tr.row-win:hover  { background: #291512; }
    tbody tr.row-loss { background: var(--dn-bg); border-left-color: var(--dn); }
    tbody tr.row-loss:hover { background: #12271D; }
    tbody tr.row-even { background: var(--surface); border-left-color: var(--text-3); }
    tbody tr.row-even:hover { background: var(--surface-3); }

    td { padding: 10px 16px; vertical-align: middle; white-space: nowrap; text-align: center; }

    .td-id   { font-weight: 700; color: var(--text); min-width: 72px; }
    .td-name { color: var(--text-2); min-width: 110px; }
    .td-date { color: var(--text-3); min-width: 90px; font-size: 12px; }
    .td-days { color: var(--text-2); min-width: 60px; }
    .td-price{ color: var(--text-2); min-width: 72px; }

    .td-pnl  { font-weight: 700; font-size: 14px; min-width: 80px; }
    .pnl-pos  { color: var(--up-bright); }
    .pnl-neg  { color: var(--dn-bright); }
    .pnl-zero { color: var(--text-3); }

    .empty-msg { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }
  </style>
</head>

</header>

// ── 統計 ──
const wins  = ROWS.filter(r => r.pnl_pct > 0);
const total = ROWS.length;
const wr    = total > 0 ? (wins.length / total * 100) : 0;
const avg   = total > 0 ? ROWS.reduce((s, r) => s + r.pnl_pct, 0) / total : 0;
const best  = total > 0 ? Math.max(...ROWS.map(r => r.pnl_pct)) : 0;
const worst = total > 0 ? Math.min(...ROWS.map(r => r.pnl_pct)) : 0;

document.getElementById('s-count').textContent = total;

const wrEl = document.getElementById('s-winrate');
wrEl.textContent = wr.toFixed(1) + '%';

const avgEl = document.getElementById('s-avg');
avgEl.textContent = (avg >= 0 ? '+' : '') + avg.toFixed(2) + '%';
avgEl.className   = 'stat-num ' + (avg > 0 ? 'pos' : avg < 0 ? 'neg' : '');

const bestEl = document.getElementById('s-best');
bestEl.textContent = '+' + best.toFixed(2) + '%';
bestEl.className   = 'stat-num pos';

const worstEl = document.getElementById('s-worst');
worstEl.textContent = worst.toFixed(2) + '%';
worstEl.className   = 'stat-num neg';

// ── sort ──
let sortCol = 'sell_date', sortDir = -1;

function sortedRows() {
  return [...ROWS].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = sortDir > 0 ? '￿' : '';
    if (vb === null || vb === undefined) vb = sortDir > 0 ? '￿' : '';
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
}

// ── render ──
let currentFilter = 'all';
let searchQuery   = '';

function filterPasses(r) {
  if (currentFilter === 'win'  && r.pnl_pct <= 0) return false;
  if (currentFilter === 'loss' && r.pnl_pct >= 0) return false;
  if (searchQuery && !r.id.includes(searchQuery) && !r.name.includes(searchQuery)) return false;
  return true;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let vis = 0;

  sortedRows().forEach(r => {
    const show = filterPasses(r);
    if (!show && r === undefined) return;

    const tr = document.createElement('tr');
    const cls = r.pnl_pct > 0 ? 'row-win' : r.pnl_pct < 0 ? 'row-loss' : 'row-even';
    tr.className = cls + (show ? '' : ' hidden-row');
    if (show) vis++;

    const pnlCls = r.pnl_pct > 0 ? 'pnl-pos' : r.pnl_pct < 0 ? 'pnl-neg' : 'pnl-zero';
    const pnlTxt = (r.pnl_pct >= 0 ? '+' : '') + r.pnl_pct.toFixed(2) + '%';
    const arrow  = r.pnl_pct > 0 ? '▲ ' : r.pnl_pct < 0 ? '▼ ' : '';

    tr.innerHTML = `
      <td class="td-id">${r.id}</td>
      <td class="td-name">${r.name || '—'}</td>
      <td class="td-date">${r.sell_date || '—'}</td>
      <td class="td-date">${r.buy_date  || '—'}</td>
      <td class="td-days">${r.hold_days} 天</td>
      <td class="td-price">${r.buy_price > 0 ? r.buy_price.toFixed(2) : '—'}</td>
      <td class="td-price">${r.sell_price > 0 ? r.sell_price.toFixed(2) : '—'}</td>
      <td class="td-pnl ${pnlCls}">${arrow}${pnlTxt}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('empty-msg').style.display = vis === 0 ? 'block' : 'none';
}

// ── sort headers ──
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? -sortDir : -1;
    sortCol = col;
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir > 0 ? '▲' : '▼';
    renderTable();
  });
});
// 預設賣出日期降序
const defaultTh = document.querySelector('thead th[data-col="sell_date"]');
defaultTh.classList.add('sorted');
defaultTh.querySelector('.sort-arrow').textContent = '▼';

// ── filter buttons ──
const ACT = { all: 'act-all', win: 'act-win', loss: 'act-loss' };
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn' + (b.dataset.filter === currentFilter ? ' ' + ACT[currentFilter] : '');
    });
    renderTable();
  });
});

// ── search ──
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderTable();
});

renderTable();
</script>
