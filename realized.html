<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>已實現損益</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
    }
    .brand { font-size: 16px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
    .nav-link {
      color: #58a6ff; text-decoration: none; font-size: 13px;
      padding: 4px 10px; border: 1px solid #30363d; border-radius: 6px;
      white-space: nowrap; transition: border-color 0.15s;
    }
    .nav-link:hover { border-color: #58a6ff; }
    .date-badge { font-size: 12px; color: #8b949e; white-space: nowrap; }

    /* filter buttons */
    .filter-group { display: flex; gap: 6px; align-items: center; }
    .filter-btn {
      background: #21262d; color: #8b949e;
      border: 1px solid #30363d; border-radius: 20px;
      padding: 4px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .filter-btn.act-all  { background: #1f6feb; border-color: #388bfd; color: #fff; }
    .filter-btn.act-win  { background: #052e16; border-color: #16a34a; color: #4ade80; }
    .filter-btn.act-loss { background: #450a0a; border-color: #dc2626; color: #f87171; }

    /* search */
    .search-box {
      background: #21262d; border: 1px solid #30363d; border-radius: 6px;
      color: #c9d1d9; font-size: 13px; padding: 4px 10px; outline: none;
      width: 130px;
    }
    .search-box::placeholder { color: #6b7280; }
    .search-box:focus { border-color: #58a6ff; }

    /* stats pills */
    .stats-pills {
      margin-left: auto;
      display: flex; gap: 20px; align-items: center;
      font-size: 12px; color: #8b949e; flex-wrap: wrap;
    }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-num  { font-size: 18px; font-weight: 700; color: #f0f6fc; line-height: 1; }
    .stat-num.pos { color: #ef4444; }
    .stat-num.neg { color: #22c55e; }
    .stat-lbl  { font-size: 10px; color: #8b949e; }

    /* ── Table area ── */
    #table-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }
    #table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    #table-wrap::-webkit-scrollbar-track { background: #0d1117; }
    #table-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      position: sticky; top: 0; z-index: 10;
      background: #161b22;
      color: #8b949e; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      white-space: nowrap; text-align: center;
      cursor: pointer; user-select: none;
    }
    thead th:hover { color: #c9d1d9; }
    thead th .sort-arrow { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-arrow { opacity: 1; color: #58a6ff; }
    thead th.no-sort { cursor: default; }
    thead th.no-sort:hover { color: #8b949e; }

    tbody tr {
      border-bottom: 1px solid #1c2128;
      transition: background 0.10s;
      cursor: default;
      border-left: 3px solid transparent;
    }
    tbody tr.hidden-row { display: none; }

    /* 行左邊框顏色 */
    tbody tr.row-win  { background: #0a1f16; border-left-color: #16a34a; }
    tbody tr.row-win:hover  { background: #0e2a1e; }
    tbody tr.row-loss { background: #1a0a0a; border-left-color: #dc2626; }
    tbody tr.row-loss:hover { background: #250d0d; }
    tbody tr.row-even { background: #111827; border-left-color: #4b5563; }
    tbody tr.row-even:hover { background: #1a2333; }

    td { padding: 10px 16px; vertical-align: middle; white-space: nowrap; text-align: center; }

    .td-id   { font-weight: 700; color: #f0f6fc; min-width: 72px; }
    .td-name { color: #8b949e; min-width: 110px; }
    .td-date { color: #6b7280; min-width: 90px; font-size: 12px; }
    .td-days { color: #8b949e; min-width: 60px; }
    .td-price{ color: #c9d1d9; min-width: 72px; }

    .td-pnl  { font-weight: 700; font-size: 14px; min-width: 80px; }
    .pnl-pos  { color: #f87171; }
    .pnl-neg  { color: #4ade80; }
    .pnl-zero { color: #6b7280; }

    .empty-msg { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }
  </style>
</head>

</header>

// ── 統計 ──
const wins  = ROWS.filter(r => r.pnl_pct > 0);
const total = ROWS.length;
const wr    = total > 0 ? (wins.length / total * 100) : 0;
const avg   = total > 0 ? ROWS.reduce((s, r) => s + r.pnl_pct, 0) / total : 0;
const best  = total > 0 ? Math.max(...ROWS.map(r => r.pnl_pct)) : 0;
const worst = total > 0 ? Math.min(...ROWS.map(r => r.pnl_pct)) : 0;

document.getElementById('s-count').textContent = total;

const wrEl = document.getElementById('s-winrate');
wrEl.textContent = wr.toFixed(1) + '%';

const avgEl = document.getElementById('s-avg');
avgEl.textContent = (avg >= 0 ? '+' : '') + avg.toFixed(2) + '%';
avgEl.className   = 'stat-num ' + (avg > 0 ? 'pos' : avg < 0 ? 'neg' : '');

const bestEl = document.getElementById('s-best');
bestEl.textContent = '+' + best.toFixed(2) + '%';
bestEl.className   = 'stat-num pos';

const worstEl = document.getElementById('s-worst');
worstEl.textContent = worst.toFixed(2) + '%';
worstEl.className   = 'stat-num neg';

// ── sort ──
let sortCol = 'sell_date', sortDir = -1;

function sortedRows() {
  return [...ROWS].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = sortDir > 0 ? '￿' : '';
    if (vb === null || vb === undefined) vb = sortDir > 0 ? '￿' : '';
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
}

// ── render ──
let currentFilter = 'all';
let searchQuery   = '';

function filterPasses(r) {
  if (currentFilter === 'win'  && r.pnl_pct <= 0) return false;
  if (currentFilter === 'loss' && r.pnl_pct >= 0) return false;
  if (searchQuery && !r.id.includes(searchQuery) && !r.name.includes(searchQuery)) return false;
  return true;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let vis = 0;

  sortedRows().forEach(r => {
    const show = filterPasses(r);
    if (!show && r === undefined) return;

    const tr = document.createElement('tr');
    const cls = r.pnl_pct > 0 ? 'row-win' : r.pnl_pct < 0 ? 'row-loss' : 'row-even';
    tr.className = cls + (show ? '' : ' hidden-row');
    if (show) vis++;

    const pnlCls = r.pnl_pct > 0 ? 'pnl-pos' : r.pnl_pct < 0 ? 'pnl-neg' : 'pnl-zero';
    const pnlTxt = (r.pnl_pct >= 0 ? '+' : '') + r.pnl_pct.toFixed(2) + '%';
    const arrow  = r.pnl_pct > 0 ? '▲ ' : r.pnl_pct < 0 ? '▼ ' : '';

    tr.innerHTML = `
      <td class="td-id">${r.id}</td>
      <td class="td-name">${r.name || '—'}</td>
      <td class="td-date">${r.sell_date || '—'}</td>
      <td class="td-date">${r.buy_date  || '—'}</td>
      <td class="td-days">${r.hold_days} 天</td>
      <td class="td-price">${r.buy_price > 0 ? r.buy_price.toFixed(2) : '—'}</td>
      <td class="td-price">${r.sell_price > 0 ? r.sell_price.toFixed(2) : '—'}</td>
      <td class="td-pnl ${pnlCls}">${arrow}${pnlTxt}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('empty-msg').style.display = vis === 0 ? 'block' : 'none';
}

// ── sort headers ──
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? -sortDir : -1;
    sortCol = col;
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir > 0 ? '▲' : '▼';
    renderTable();
  });
});
// 預設賣出日期降序
const defaultTh = document.querySelector('thead th[data-col="sell_date"]');
defaultTh.classList.add('sorted');
defaultTh.querySelector('.sort-arrow').textContent = '▼';

// ── filter buttons ──
const ACT = { all: 'act-all', win: 'act-win', loss: 'act-loss' };
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn' + (b.dataset.filter === currentFilter ? ' ' + ACT[currentFilter] : '');
    });
    renderTable();
  });
});

// ── search ──
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderTable();
});

renderTable();
</script>
