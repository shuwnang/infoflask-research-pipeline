    /* ‚ĒÄ‚ĒÄ Header ‚ĒÄ‚ĒÄ */

    .brand {

    }

    .date-selector {

      align-items: center;
      gap: 8px;
    }

    .date-selector label {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }

    select {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 4px 28px 4px 10px;
      font-size: 13px;
      cursor: pointer;
      appearance: none;

      background-repeat: no-repeat;
      background-position: right 8px center;

    select:focus { outline: none; border-color: #58a6ff; }

    /* ‚ĒÄ‚ĒÄ Legend ‚ĒÄ‚ĒÄ */
    .legend {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-left: auto;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .swatch-top10 { background: #ffd700; border: 2px solid #ef4444; }
    .swatch-top30 { background: #ffd700; border: 2px solid transparent; }
    .swatch-other { background: #0f4c81; }
    .swatch-size  { border: 1px dashed #475569; background: transparent; }

    /* ‚ĒÄ‚ĒÄ Treemap ‚ĒÄ‚ĒÄ */
    #chart {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #chart svg { display: block; }

    .tile { cursor: pointer; }

    .tile rect.bg {
      stroke: #0d1117;
      stroke-width: 2px;
      transition: filter 0.15s;
    }

    /* Top 10 ÁīÖś°Ü */
    .tile.top10 rect.bg {
      stroke: #ef4444;
      stroke-width: 3px;
    }

    .tile:hover rect.bg { filter: brightness(1.25); }

    .tile text {
      pointer-events: none;
      fill: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }
    /* ťáĎŤČ≤ŚļēÔľąTop 30ÔľČÁĒ®ś∑ĪŚ≠ó */

    .tile .t-name { font-size: 11px; opacity: 0.85; }
    .tile .t-rank { font-size: 10px; font-weight: 700; }
    .tile .t-new  { font-size: 10px; font-weight: 700; }

    /* ‚ĒÄ‚ĒÄ Modal ‚ĒÄ‚ĒÄ */

      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px 28px;
      min-width: 300px;
      max-width: 500px;
      width: 90vw;
      position: relative;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }

    .modal-close {

      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 20px;
      cursor: pointer;
      line-height: 1;

    .modal-close:hover { color: #f0f6fc; }

    .badge-other { background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; }

    .modal-total-score {

    .score-top10 { color: #ef4444; }

    /* ś®°ŚěčŚąÜśēłŚćÄŚ°ä */

const DATES    = ["2026-07-01", "2026-06-30", "2026-06-29", "2026-06-26", "2026-06-25", "2026-06-24", "2026-06-23"];

// ‚ĒÄ‚ĒÄ ŤČ≤ŚĹ© ‚ĒÄ‚ĒÄ
const COLOR_GOLD = "#ffd700";
const COLOR_BLUE = "#0f4c81";

function tileColor(d) {
  return d.rank <= 30 ? COLOR_GOLD : COLOR_BLUE;
}

// ‚ĒÄ‚ĒÄ Ś∑•ŚÖ∑ŚáĹŚľŹ ‚ĒÄ‚ĒÄ
function fmtMoney(v) {
  if (!v || v <= 0) return "N/A";
  if (v >= 1e12) return (v / 1e12).toFixed(2) + " ŚÖÜ";
  if (v >= 1e8)  return (v / 1e8).toFixed(1) + " ŚĄĄ";
  return (v / 1e4).toFixed(0) + " Ťź¨";
}

function rankBadgeClass(rank) {
  if (rank <= 10) return "badge-top10";
  if (rank <= 30) return "badge-top30";
  return "badge-other";
}

function rankScoreClass(rank) {
  if (rank <= 10) return "score-top10";
  if (rank <= 30) return "score-top30";
  return "score-other";
}

// ‚ĒÄ‚ĒÄ Treemap ‚ĒÄ‚ĒÄ
let currentDate = DATES[0];
const container = document.getElementById("chart");

function renderTreemap(dateStr) {
  const stocks = ALL_DATA[dateStr];
  if (!stocks || stocks.length === 0) return;

  container.innerHTML = "";
  const W = container.clientWidth;
  const H = container.clientHeight;
  if (W === 0 || H === 0) return;

  const svg = d3.select(container)
    .append("svg")
    .attr("width", W)
    .attr("height", H);

  const maxMv   = d3.max(stocks, d => d.market_value) || 1;
  const floorMv = maxMv * 0.02;

  const root = d3.hierarchy({ children: stocks })
    .sum(d => Math.max(d.market_value || 1, floorMv))
    .sort((a, b) => b.value - a.value);

  d3.treemap()
    .tile(d3.treemapSquarify.ratio(1.2))
    .size([W, H])
    .paddingInner(2)
    .paddingOuter(3)
    (root);

  const cell = svg.selectAll("g.tile")
    .data(root.leaves())
    .join("g")
    .attr("class", d => {
      let cls = "tile";
      if (d.data.rank <= 30) cls += " gold-tile";
      if (d.data.rank <= 10) cls += " top10";
      return cls;
    })
    .attr("transform", d => `translate(${d.x0},${d.y0})`)
    .on("click", (_, d) => openModal(d.data));

  // ŤÉĆśôĮÁü©ŚĹĘ
  cell.append("rect")
    .attr("class", "bg")
    .attr("width",  d => Math.max(0, d.x1 - d.x0))
    .attr("height", d => Math.max(0, d.y1 - d.y0))
    .attr("rx", 4)
    .attr("fill", d => tileColor(d.data));

  // clip-path
  cell.append("clipPath")
    .attr("id", d => `cp-${d.data.id}`)
    .append("rect")
    .attr("width",  d => Math.max(0, d.x1 - d.x0 - 4))
    .attr("height", d => Math.max(0, d.y1 - d.y0 - 4))
    .attr("x", 2).attr("y", 2);

  const content = cell.append("g")
    .attr("clip-path", d => `url(#cp-${d.data.id})`);

  const wOf = d => d.x1 - d.x0;
  const hOf = d => d.y1 - d.y0;

  content.each(function(d) {
    const w = wOf(d), h = hOf(d);
    if (w < 28 || h < 18) return;

    const g = d3.select(this);
    const fontSize = Math.min(Math.max(w * 0.22, 10), 22);
    const cx = w / 2;
    const cy = h * 0.38;

    // Ťā°Á•®šĽ£Ťôü
    g.append("text")
      .attr("class", "t-id")
      .attr("x", cx).attr("y", cy)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "middle")
      .style("font-size", fontSize + "px")
      .text(d.data.id);

    // ŚÖ¨ŚŹłŚźćÁ®Ī
    if (h > 45 && w > 50) {
      const nfs = Math.min(fontSize * 0.62, 13);
      g.append("text")
        .attr("class", "t-name")
        .attr("x", cx)
        .attr("y", cy + fontSize * 0.65 + nfs)
        .attr("text-anchor", "middle")
        .attr("dominant-baseline", "middle")
        .style("font-size", nfs + "px")
        .text(d.data.name);
    }

    // śéíŚźćÔľąŚ∑¶šłäŤßíÔľČ
    if (w > 36 && h > 22) {
      const rankColor = d.data.rank <= 10 ? "#ef4444"
                      : d.data.rank <= 30 ? "#7c3a00"
                      : "#93c5fd";
      g.append("text")
        .attr("class", "t-rank")
        .attr("x", 5).attr("y", 13)
        .attr("text-anchor", "start")
        .attr("dominant-baseline", "middle")
        .style("font-size", "10px")
        .style("fill", rankColor)
        .style("font-weight", "700")
        .text("#" + d.data.rank);
    }

    // NEW ś®ôŤ®ėÔľąŚŹ≥šłäŤßíÔľČ
    if (d.data.is_new && w > 36 && h > 22) {
      g.append("text")
        .attr("class", "t-new")
        .attr("x", w - 5).attr("y", 13)
        .attr("text-anchor", "end")
        .attr("dominant-baseline", "middle")
        .style("font-size", "10px")
        .style("fill", "#fca5a5")
        .style("font-weight", "700")
        .text("NEW");
    }
  });
}

// ‚ĒÄ‚ĒÄ Modal ‚ĒÄ‚ĒÄ
function buildScoreCards(scores, direction) {
  const isUp = direction === "up";
  const marker = isUp ? "‚ÜĎ" : "‚Üď";
  const entries = Object.entries(scores).filter(([label]) => label.includes(marker));
  if (entries.length === 0) {
    return `<div style="color:#8b949e;font-size:12px;padding:8px;">ÔľąÁĄ°Ť≥áśĖôÔľČ</div>`;
  }
  return entries.map(([label, score]) => {
    const cls  = isUp ? "up-val" : "dn-val";
    const sign = score > 0 ? "+" : "";
    return `
      <div class="metric-card">
        <div class="metric-label">${label}</div>
        <div class="metric-value ${cls}">${sign}${score.toFixed(2)}</div>
      </div>`;
  }).join("");
}

function openModal(stock) {
  document.getElementById("m-id").textContent   = stock.id;
  document.getElementById("m-name").textContent = stock.name || "ÔľąÁĄ°ŚźćÁ®ĪÔľČ";

  const badge = document.getElementById("m-rank-badge");
  badge.textContent = "Top " + stock.rank;
  badge.className   = "modal-rank-badge " + rankBadgeClass(stock.rank);

  const tsEl = document.getElementById("m-total-score");
  tsEl.textContent = stock.total_score.toFixed(3);
  tsEl.className   = "modal-total-score " + rankScoreClass(stock.rank);

  document.getElementById("m-up-scores").innerHTML = buildScoreCards(stock.scores, "up");
  document.getElementById("m-dn-scores").innerHTML = buildScoreCards(stock.scores, "dn");

  document.getElementById("m-mv").textContent       = fmtMoney(stock.market_value);
  document.getElementById("m-turnover").textContent = fmtMoney(stock.turnover);
  document.getElementById("m-new-row").style.display = stock.is_new ? "block" : "none";

  document.getElementById("overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ‚ĒÄ‚ĒÄ Filter ‚ĒÄ‚ĒÄ
let currentFilter = "all";

const FILTER_MATCH = {
  all:   () => true,
  top10: d => d.rank <= 10,
  top30: d => d.rank <= 30,
  new:   d => d.is_new,
};

const FILTER_ACTIVE = {
  all:   "active-all",
  top10: "active-top10",
  top30: "active-top30",
  new:   "active-new",
};

function applyFilter(filter) {
  currentFilter = filter;
  const match = FILTER_MATCH[filter];
  document.querySelectorAll(".filter-btn").forEach(btn => {
    const f = btn.dataset.filter;
    btn.className = "filter-btn" + (f === filter ? " " + FILTER_ACTIVE[f] : "");
  });
  d3.selectAll(".tile").classed("dimmed", d => !match(d.data));
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => applyFilter(btn.dataset.filter));
});

// ‚ĒÄ‚ĒÄ Date selector ‚ĒÄ‚ĒÄ
const sel = document.getElementById("date-sel");
DATES.forEach(d => {
  const opt = document.createElement("option");

  sel.appendChild(opt);

sel.value = currentDate;
sel.addEventListener("change", () => {

window.addEventListener("resize", () => renderTreemap(currentDate));
renderTreemap(currentDate);
