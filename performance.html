<style>
  :root {
    --bg:#0A0C10; --surface:#12151C; --surface-2:#171B24; --surface-3:#1D2330;
    --border:#232936; --border-strong:#2E3646;
    --text:#E7EBF2; --text-2:#9AA4B2; --text-3:#5C6675;
    --accent:#E8C158; --accent-soft:rgba(232,193,88,0.10);
    --link:#6CA8FF;
    --up:#F0544C; --up-bg:#1D0F0E; --dn:#3FBF7F; --dn-bg:#0C1B14;
    --warn:#F5A524; --risk:#F0544C;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(108,168,255,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:"Inter","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    font-variant-numeric:tabular-nums;
    min-height:100vh;
  }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-thumb { background:#2A3140; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover { background:#38424F; }
  ::-webkit-scrollbar-track { background:transparent; }
  /* Header — 與其他頁一致的全寬列 */
  header {
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    padding:12px 22px;
    background:rgba(10,12,16,0.88); backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:50;
  }
  .brand { font-size:17px; font-weight:900; color:#fff; letter-spacing:0.08em; white-space:nowrap; }
  .brand-page { font-size:13px; font-weight:500; color:var(--text-3); margin-left:2px; }
  .date-badge { font-size:12px; color:var(--text-3); white-space:nowrap; }
  .spacer { flex:1; }
  .nav-link {
    color:var(--text-2); text-decoration:none; font-size:13px; font-weight:500;
    border:1px solid var(--border); border-radius:999px; padding:5px 14px;
    background:transparent; transition:all .15s ease; white-space:nowrap;
  }
  .nav-link:hover { color:var(--text); border-color:var(--border-strong); background:var(--surface-2); }
  .site-nav { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .nav-link.active { color:var(--accent); border-color:var(--accent); background:var(--accent-soft); pointer-events:none; }

  .wrap { max-width:1180px; margin:0 auto; padding:20px 18px 44px; }

  /* 統計卡列 */
  .stats-row { display:flex; flex-wrap:wrap; gap:12px; padding:6px 0 22px; }
  .stat {
    display:flex; flex-direction:column; gap:4px;
    background:linear-gradient(180deg,#151A23 0%, var(--surface) 100%);
    border:1px solid var(--border); border-radius:12px; padding:14px 20px;
    box-shadow:0 10px 30px -18px rgba(0,0,0,0.7);
  }
  .stat .lbl { font-size:11px; color:var(--text-3); letter-spacing:.08em; }
  .stat .val { font-size:1.5rem; font-weight:800; letter-spacing:-0.01em; line-height:1; font-variant-numeric:tabular-nums; }
  .stat .sub { font-size:.72rem; color:var(--text-3); }

  /* 圖表卡（頁面主角） */
  .chart {
    background:linear-gradient(180deg,#151A23 0%, var(--surface) 100%);
    border:1px solid var(--border); border-radius:16px; padding:20px 22px;
    box-shadow:0 10px 30px -18px rgba(0,0,0,0.7);
  }
  .chart h2 { font-size:.9rem; color:var(--text-2); font-weight:600; margin-bottom:10px; letter-spacing:.02em; }
  footer { color:var(--text-3); font-size:.74rem; margin-top:18px; text-align:center; }
  ::selection { background:rgba(108,168,255,0.28); }
</style>
</head>
