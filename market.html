<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <title>大盤觀測</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(1200px 600px at 100% -10%, rgba(56,139,253,0.06), transparent 60%), #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; font-variant-numeric: tabular-nums;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    header {
      flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 12px 20px;
      background: rgba(22,27,34,0.85); backdrop-filter: blur(8px);
      border-bottom: 1px solid #262c36; box-shadow: 0 4px 16px -8px rgba(0,0,0,0.6);
      flex-wrap: wrap; z-index: 20;
    }
    .brand { font-size: 16px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
    .site-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      color: #79b8ff; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 5px 12px; border: 1px solid #262c36; border-radius: 8px;
      white-space: nowrap; transition: all 0.15s ease;
    }
    .nav-link:hover { border-color: #388bfd; background: rgba(56,139,253,0.12); color: #a6d0ff; }
    .nav-link.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.08); pointer-events: none; }

    #main { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; gap: 12px;
            max-width: 1280px; width: 100%; margin: 0 auto; }
    .chips { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip { background: #161b22; border: 1px solid #262c36; border-radius: 10px; padding: 8px 14px; min-width: 116px; }
    .chip .lab { font-size: 11px; color: #8b949e; letter-spacing: 0.05em; }
    .chip .val { font-size: 18px; font-weight: 700; margin-top: 2px; }
    .v-close { color: #58a6ff; } .v-vol { color: #fb923c; }

    .hz-group { display: flex; gap: 6px; align-items: center; }
    .hz-btn {
      background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 20px;
      padding: 4px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .hz-btn.act { background: #3b1d06; border-color: #fb923c; color: #fb923c; }

    #chart-card { background: #161b22; border: 1px solid #262c36; border-radius: 12px;
                  padding: 14px; position: relative; flex: 1; min-height: 420px;
                  display: flex; flex-direction: column; }
    .legend { display: flex; gap: 18px; font-size: 12px; color: #8b949e; margin-bottom: 8px; flex-wrap: wrap; }
    .lg { display: flex; align-items: center; gap: 6px; }
    .lg-line { width: 18px; height: 3px; border-radius: 2px; }
    #canvas-wrap { flex: 1; position: relative; min-height: 360px; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #tooltip {
      position: absolute; pointer-events: none; display: none; z-index: 30;
      background: rgba(13,17,23,0.95); border: 1px solid #30363d; border-radius: 8px;
      padding: 8px 12px; font-size: 12px; white-space: nowrap;
      box-shadow: 0 8px 24px -6px rgba(0,0,0,0.8);
    }
    #tooltip .tt-date { color: #f0f6fc; font-weight: 700; margin-bottom: 4px; }
    #tooltip .tt-row { display: flex; justify-content: space-between; gap: 14px; color: #8b949e; }
    #tooltip .tt-row b { color: #e6edf3; }
    .note { font-size: 11px; color: #57606a; margin-top: 6px; }

let HZ = 5;
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const wrap = document.getElementById('canvas-wrap');
let geom = null;

function updChips() {
  const n = DATA.dates.length;
  const c = DATA.close;
  document.getElementById('c-close').textContent = c[n-1].toLocaleString();
  const chg = (c[n-1] / c[n-2] - 1) * 100;
  const el = document.getElementById('c-chg');
  el.textContent = (chg >= 0 ? '+' : '') + chg.toFixed(2) + '%';
  el.style.color = chg > 0 ? '#ef4444' : chg < 0 ? '#22c55e' : '#8b949e';
  const vs = DATA['vol' + HZ];
  let lastV = null;
  for (let i = n - 1; i >= 0; i--) if (vs[i] !== null) { lastV = vs[i]; break; }
  document.getElementById('c-vol').textContent = lastV !== null ? lastV.toFixed(1) + '%' : '—';
  if (lastV !== null) {
    const arr = vs.filter(v => v !== null);
    const pct = arr.filter(v => v < lastV).length / arr.length * 100;
    const pe = document.getElementById('c-pct');
    pe.textContent = 'P' + pct.toFixed(0);
    pe.style.color = pct >= 90 ? '#f87171' : '#fb923c';
  }
}

function draw() {
  const W = wrap.clientWidth, H = wrap.clientHeight;
  if (!W || !H) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);
  const padL = 44, padR = 62, padT = 10, padB = 26;
  const cw = W - padL - padR, ch = H - padT - padB;
  const n = DATA.dates.length;
  const x = i => padL + cw * i / (n - 1);

  const vs = DATA['vol' + HZ];
  const vArr = vs.filter(v => v !== null);
  const vMax = Math.max(...vArr) * 1.08;
  const yV = v => padT + ch * (1 - v / vMax);
  const c = DATA.close;
  let cLo = Math.min(...c), cHi = Math.max(...c);
  const pad = (cHi - cLo) * 0.05; cLo -= pad; cHi += pad;
  const yC = v => padT + ch * (1 - (v - cLo) / (cHi - cLo));

  ctx.font = '10px system-ui, sans-serif'; ctx.textBaseline = 'middle';
  // 左軸（波動）格線
  for (let t = 0; t <= 5; t++) {
    const v = vMax * t / 5, y = yV(v);
    ctx.strokeStyle = 'rgba(48,54,61,0.5)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = '#fb923c99'; ctx.textAlign = 'right';
    ctx.fillText(v.toFixed(0) + '%', padL - 5, y);
  }
  // 右軸（指數）
  for (let t = 0; t <= 5; t++) {
    const v = cLo + (cHi - cLo) * t / 5;
    ctx.fillStyle = '#58a6ff99'; ctx.textAlign = 'left';
    ctx.fillText(Math.round(v).toLocaleString(), W - padR + 6, yC(v));
  }
  // X 標籤
  ctx.fillStyle = '#8b949e'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const step = Math.max(1, Math.round(n / 8));
  for (let i = 0; i < n; i += step) ctx.fillText(DATA.dates[i].slice(0, 7), x(i), H - padB + 8);

  // P90 警戒線
  const p90 = DATA.p90[String(HZ)];
  if (p90 && p90 < vMax) {
    ctx.strokeStyle = 'rgba(248,113,113,0.5)'; ctx.setLineDash([5, 4]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, yV(p90)); ctx.lineTo(W - padR, yV(p90)); ctx.stroke();
    ctx.setLineDash([]);
  }
  // 波動長條
  const bw = Math.max(1, cw / n * 0.8);
  const y0 = yV(0);
  for (let i = 0; i < n; i++) {
    if (vs[i] === null) continue;
    ctx.fillStyle = (p90 && vs[i] >= p90) ? 'rgba(248,113,113,0.85)' : 'rgba(251,146,60,0.55)';
    ctx.fillRect(x(i) - bw / 2, yV(vs[i]), bw, y0 - yV(vs[i]));
  }
  // 指數折線
  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const px = x(i), py = yC(c[i]);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  geom = { padL, padR, padT, padB, cw, ch, n, x, yC, yV };
}

wrap.addEventListener('mousemove', e => {
  if (!geom) return;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  let i = Math.round((mx - geom.padL) / (geom.cw / (geom.n - 1)));
  i = Math.max(0, Math.min(geom.n - 1, i));
  const vs = DATA['vol' + HZ];
  tooltip.innerHTML = `<div class="tt-date">${DATA.dates[i]}</div>` +
    `<div class="tt-row"><span>TAIEX</span><b style="color:#58a6ff">${DATA.close[i].toLocaleString()}</b></div>` +
    (vs[i] !== null ? `<div class="tt-row"><span>預測波動 ${HZ}d</span><b style="color:#fb923c">${vs[i].toFixed(1)}%</b></div>` : '');
  tooltip.style.display = 'block';
  const tw = tooltip.offsetWidth;
  let tx = geom.x(i) + 12;
  if (tx + tw > rect.width - 4) tx = geom.x(i) - tw - 12;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = Math.max(4, e.clientY - rect.top - 40) + 'px';
  draw();
  ctx.strokeStyle = 'rgba(139,148,158,0.45)'; ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(geom.x(i), geom.padT); ctx.lineTo(geom.x(i), geom.padT + geom.ch); ctx.stroke();
  ctx.setLineDash([]);
});
wrap.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; draw(); });

document.querySelectorAll('.hz-btn').forEach(b => {
  b.addEventListener('click', () => {
    HZ = parseInt(b.dataset.hz);
    document.querySelectorAll('.hz-btn').forEach(o => o.classList.toggle('act', o === b));
    updChips(); draw();
  });
});
window.addEventListener('resize', draw);
updChips(); draw();
</script>
