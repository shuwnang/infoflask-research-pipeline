<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大盤觀測</title>
  <style>
    :root {
      --bg: #0A0C10; --surface: #12151C; --surface-2: #171B24; --surface-3: #1D2330;
      --border: #232936; --border-strong: #2E3646;
      --text: #E7EBF2; --text-2: #9AA4B2; --text-3: #5C6675;
      --accent: #E8C158; --accent-soft: rgba(232,193,88,0.10);
      --link: #6CA8FF;
      --up: #F0544C; --up-bg: #1D0F0E; --dn: #3FBF7F; --dn-bg: #0C1B14;
      --warn: #F5A524; --risk: #F0544C;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: rgba(108,168,255,0.28); }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2A3140; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #38424F; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
      -webkit-font-smoothing: antialiased; font-variant-numeric: tabular-nums;
      min-height: 100dvh; display: flex; flex-direction: column;
    }
    header {
      flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 12px 22px;
      background: rgba(10,12,16,0.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      flex-wrap: wrap; z-index: 20;
    }
    .brand { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: 0.08em; white-space: nowrap; }
    .brand-page { font-size: 13px; font-weight: 500; color: var(--text-3); margin-left: 2px; }
    .site-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .nav-link {
      color: var(--text-2); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 999px;
      background: transparent;
      white-space: nowrap; transition: all 0.15s ease;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
    .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); pointer-events: none; }

    #main { flex: 1; display: flex; flex-direction: column; padding: 16px 20px; gap: 12px;
            max-width: 1280px; width: 100%; margin: 0 auto; }
    .chips { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip { background: linear-gradient(180deg,#151A23 0%, var(--surface) 100%); border: 1px solid var(--border);
            border-radius: 12px; padding: 8px 14px; min-width: 116px;
            box-shadow: 0 10px 30px -18px rgba(0,0,0,0.7); }
    .chip .lab { font-size: 11px; color: var(--text-3); letter-spacing: 0.08em; }
    .chip .val { font-size: 18px; font-weight: 700; margin-top: 2px; }
    .v-close { color: var(--link); } .v-vol { color: var(--warn); }

    .hz-group { display: flex; gap: 6px; align-items: center; }
    .hz-btn {
      background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .hz-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .hz-btn.act { background: rgba(245,165,36,0.10); border-color: var(--warn); color: var(--warn); }

    #chart-card { background: linear-gradient(180deg,#151A23 0%, var(--surface) 100%); border: 1px solid var(--border);
                  border-radius: 16px; box-shadow: 0 10px 30px -18px rgba(0,0,0,0.7);
                  padding: 20px 22px; position: relative; flex: 1; min-height: 420px;
                  display: flex; flex-direction: column; }
    .legend { display: flex; gap: 18px; font-size: 12px; color: var(--text-2); margin-bottom: 8px; flex-wrap: wrap; }
    .lg { display: flex; align-items: center; gap: 6px; }
    .lg-line { width: 18px; height: 3px; border-radius: 2px; }
    #canvas-wrap { flex: 1; position: relative; min-height: 360px; }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #tooltip {
      position: absolute; pointer-events: none; display: none; z-index: 30;
      background: rgba(18,21,28,0.95); border: 1px solid var(--border-strong); border-radius: 8px;
      padding: 8px 12px; font-size: 12px; white-space: nowrap;
      box-shadow: 0 8px 24px -6px rgba(0,0,0,0.8);
    }
    #tooltip .tt-date { color: var(--text); font-weight: 700; margin-bottom: 4px; }
    #tooltip .tt-row { display: flex; justify-content: space-between; gap: 14px; color: var(--text-2); }
    #tooltip .tt-row b { color: var(--text); }
    .note { font-size: 11px; color: var(--text-3); margin-top: 6px; }
  </style>
</head>
<body>
<header>
  <div class="brand">INFOFLASK<span class="brand-page">｜大盤觀測</span></div>
  <nav class="site-nav">
    <a href="index.html" class="nav-link">首頁</a>
    <a href="scores.html" class="nav-link">評分表</a>
    <a href="holdings.html" class="nav-link">模型持股</a>
    <a href="realized.html" class="nav-link">已實現損益</a>
    <a href="performance.html" class="nav-link">績效表</a>
    <a href="trend.html" class="nav-link">排名趨勢</a>
    <a href="market.html" class="nav-link active">大盤觀測</a>
  </nav>
  <div class="hz-group">
    <span style="font-size:12px;color:#9AA4B2;">預測週期</span>
    <button class="hz-btn" data-hz="1">1日</button>
    <button class="hz-btn" data-hz="3">3日</button>
    <button class="hz-btn act" data-hz="5">5日</button>
  </div>
</header>

<div id="main">
  <div class="chips">
    <div class="chip"><div class="lab">最新收盤</div><div class="val v-close" id="c-close">—</div></div>
    <div class="chip"><div class="lab">前日漲跌幅</div><div class="val" id="c-chg">—</div></div>
    <div class="chip"><div class="lab">預測波動（年化）</div><div class="val v-vol" id="c-vol">—</div></div>
    <div class="chip"><div class="lab">波動分位（2025起）</div><div class="val v-vol" id="c-pct">—</div></div>
  </div>
  <div id="chart-card">
    <div class="legend">
      <div class="lg"><div class="lg-line" style="background:#6CA8FF;"></div>TAIEX 收盤（右軸）</div>
      <div class="lg"><div class="lg-line" style="background:#F5A524;height:8px;"></div>LSTM 預測波動 年化%（左軸）</div>
      <div class="lg"><div class="lg-line" style="background:#F0544C;height:8px;"></div>超過歷史 P90（警戒）</div>
      <div class="lg"><div class="lg-line" style="background:transparent;border-top:2px dashed #F0544C;"></div>P90 線</div>
    </div>
    <div id="canvas-wrap"><canvas id="chart"></canvas><div id="tooltip"></div></div>
    <div class="note">波動預測 = 大盤 LSTM（walk-forward 無前視，2014 起逐年重訓）；預測值代表「未來 N 日已實現波動（年化）」。圖表顯示 2025 年起；P90 警戒與波動分位皆以 2025 起資料計算。</div>
  </div>
</div>

  const p90 = DATA.p90[String(HZ)];
  if (p90 && p90 < vMax) {
    ctx.strokeStyle = 'rgba(240,84,76,0.5)'; ctx.setLineDash([5, 4]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, yV(p90)); ctx.lineTo(W - padR, yV(p90)); ctx.stroke();
    ctx.setLineDash([]);
  }
  // 波動長條
  const bw = Math.max(1, cw / n * 0.8);
  const y0 = yV(0);
  for (let i = 0; i < n; i++) {
    if (vs[i] === null) continue;
    ctx.fillStyle = (p90 && vs[i] >= p90) ? 'rgba(240,84,76,0.85)' : 'rgba(245,165,36,0.55)';
    ctx.fillRect(x(i) - bw / 2, yV(vs[i]), bw, y0 - yV(vs[i]));
  }
  // 指數折線
  ctx.strokeStyle = '#6CA8FF'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const px = x(i), py = yC(c[i]);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.stroke();
  geom = { padL, padR, padT, padB, cw, ch, n, x, yC, yV };
}

wrap.addEventListener('mousemove', e => {
  if (!geom) return;
  const rect = wrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  let i = Math.round((mx - geom.padL) / (geom.cw / (geom.n - 1)));
  i = Math.max(0, Math.min(geom.n - 1, i));
  const vs = DATA['vol' + HZ];
  tooltip.innerHTML = `<div class="tt-date">${DATA.dates[i]}</div>` +
    `<div class="tt-row"><span>TAIEX</span><b style="color:#6CA8FF">${DATA.close[i].toLocaleString()}</b></div>` +
    (vs[i] !== null ? `<div class="tt-row"><span>預測波動 ${HZ}d</span><b style="color:#F5A524">${vs[i].toFixed(1)}%</b></div>` : '');
  tooltip.style.display = 'block';
  const tw = tooltip.offsetWidth;
  let tx = geom.x(i) + 12;
  if (tx + tw > rect.width - 4) tx = geom.x(i) - tw - 12;
  tooltip.style.left = tx + 'px';
  tooltip.style.top = Math.max(4, e.clientY - rect.top - 40) + 'px';
  draw();
  ctx.strokeStyle = 'rgba(154,164,178,0.45)'; ctx.setLineDash([3, 3]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(geom.x(i), geom.padT); ctx.lineTo(geom.x(i), geom.padT + geom.ch); ctx.stroke();
  ctx.setLineDash([]);
});
wrap.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; draw(); });

document.querySelectorAll('.hz-btn').forEach(b => {
  b.addEventListener('click', () => {
    HZ = parseInt(b.dataset.hz);
    document.querySelectorAll('.hz-btn').forEach(o => o.classList.toggle('act', o === b));
    updChips(); draw();
  });
});
window.addEventListener('resize', draw);
updChips(); draw();
</script>
</body>
</html>
