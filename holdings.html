<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型持股</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e2e8f0;
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', system-ui, sans-serif;
      min-height: 100dvh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
    }
    .brand { font-size: 16px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
    .nav-link {
      color: #58a6ff; text-decoration: none; font-size: 13px;
      padding: 4px 10px; border: 1px solid #30363d; border-radius: 6px;
      white-space: nowrap;
    }
    .nav-link:hover { border-color: #58a6ff; }
    .date-badge { font-size: 12px; color: #8b949e; white-space: nowrap; }

    /* ── Legend ── */
    .legend {
      display: flex; align-items: center; gap: 14px;
      margin-left: auto; flex-wrap: wrap;
      font-size: 12px; color: #8b949e;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .swatch {
      width: 13px; height: 13px; border-radius: 3px;
      border: 2px solid transparent; flex-shrink: 0;
    }
    .sw-up      { background: #450a0a; border-color: #dc2626; }
    .sw-down    { background: #052e16; border-color: #16a34a; }
    .sw-sell    { background: #1f2937; border-color: #6b7280; }
    .sw-buy     { background: #451a03; border-color: #d97706; }
    .sw-neutral { background: #1e3a5f; border-color: #3b82f6; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex; gap: 32px; padding: 10px 20px;
      background: #161b22; border-bottom: 1px solid #30363d;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; min-width: 64px; }
    .stat-label { font-size: 11px; color: #8b949e; }
    .stat-value { font-size: 20px; font-weight: 700; color: #f0f6fc; }
    .stat-value.pos { color: #ef4444; }
    .stat-value.neg { color: #22c55e; }

    /* ── Blocks area ── */
    .blocks-area { padding: 16px 14px; }
    .section-title {
      font-size: 12px; font-weight: 600; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-bottom: 12px;
    }
    .blocks-grid { display: flex; flex-wrap: wrap; gap: 10px; }

    /* ── Individual block ── */
    .block {
      width: 150px; height: 150px;
      border-radius: 10px; border: 2px solid transparent;
      padding: 10px; cursor: pointer; position: relative;
      transition: filter 0.15s, transform 0.1s;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      user-select: none;
    }
    .block:hover { filter: brightness(1.3); transform: scale(1.03); }
    .block.up      { background: #450a0a; border-color: #dc2626; }
    .block.down    { background: #052e16; border-color: #16a34a; }
    .block.neutral { background: #1e3a5f; border-color: #3b82f6; }
    .block.sell    { background: #1f2937; border-color: #6b7280; }
    .block.buy     { background: #451a03; border-color: #d97706; }

    .b-id   { font-size: 22px; font-weight: 800; color: #f0f6fc; }
    .b-name {
      font-size: 11px; color: rgba(255,255,255,0.6);
      margin-top: 2px; max-width: 138px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .b-ret  { font-size: 17px; font-weight: 700; margin-top: 6px; }
    .ret-pos  { color: #f87171; }
    .ret-neg  { color: #4ade80; }
    .ret-zero { color: #94a3b8; }
    .b-chg  { font-size: 11px; margin-top: 2px; opacity: 0.8; }
    .chg-pos { color: #fca5a5; }
    .chg-neg { color: #86efac; }

    /* corner badge */
    .c-badge {
      position: absolute; top: 6px; right: 7px;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px; border-radius: 4px;
    }
    .cb-sell { background: #374151; color: #9ca3af; }
    .cb-buy  { background: #92400e; color: #fcd34d; }

    /* ── Modal ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 12px; padding: 24px 28px;
      min-width: 300px; max-width: 440px; width: 90vw;
      position: relative; animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none;
      color: #8b949e; font-size: 20px; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: #f0f6fc; }
    .m-id   { font-size: 28px; font-weight: 800; color: #f0f6fc; }
    .m-name { font-size: 15px; color: #8b949e; margin-top: 2px; margin-bottom: 14px; }
    .m-ret  { font-size: 52px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .m-ret.pos  { color: #ef4444; }
    .m-ret.neg  { color: #22c55e; }
    .m-ret.zero { color: #94a3b8; }
    .info-row {
      display: flex; justify-content: space-between;
      padding: 8px 14px; background: #21262d;
      border-radius: 8px; font-size: 13px;
      color: #8b949e; margin-bottom: 8px;
    }
    .info-val { color: #c9d1d9; font-weight: 600; }
    .action-badge {
      margin-top: 10px; padding: 8px 14px;
      border-radius: 8px; font-size: 13px;
      font-weight: 600; text-align: center;
    }
    .ab-hold { background: #1e3a5f; color: #60a5fa; }
    .ab-sell { background: #1f2937; color: #9ca3af; border: 1px solid #6b7280; }
    .ab-buy  { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }
  </style>
</head>

// ── 統計 ──
const holds = BLOCKS.filter(b => b.type === 'hold');
const buys  = BLOCKS.filter(b => b.type === 'buy');
const sells = BLOCKS.filter(b => b.action_tomorrow === 'SELL');
const avgRet = holds.length
  ? holds.reduce((s, b) => s + b.return_pct, 0) / holds.length
  : 0;

document.getElementById('s-hold').textContent = holds.length;
const avgEl = document.getElementById('s-avg');
avgEl.textContent = (avgRet >= 0 ? '+' : '') + avgRet.toFixed(2) + '%';
avgEl.className   = 'stat-value ' + (avgRet > 0 ? 'pos' : avgRet < 0 ? 'neg' : '');
document.getElementById('s-sell').textContent = sells.length;
document.getElementById('s-buy').textContent  = buys.length;

// ── 渲染方塊 ──
function renderBlocks() {
  const grid = document.getElementById('grid');
  BLOCKS.forEach(b => {
    const el = document.createElement('div');
    el.className = 'block ' + b.color;
    el.onclick = () => openModal(b);

    let html = `<div class="b-id">${b.id}</div>`;
    if (b.name) html += `<div class="b-name">${b.name}</div>`;

    if (b.return_pct !== null && b.return_pct !== undefined) {
      const cls  = b.return_pct > 0 ? 'ret-pos' : b.return_pct < 0 ? 'ret-neg' : 'ret-zero';
      const sign = b.return_pct >= 0 ? '+' : '';
      html += `<div class="b-ret ${cls}">${sign}${b.return_pct.toFixed(2)}%</div>`;
      if (b.today_chg !== null && b.today_chg !== undefined) {
        const cc    = b.today_chg > 0 ? 'chg-pos' : b.today_chg < 0 ? 'chg-neg' : '';
        const arrow = b.today_chg > 0 ? '▲' : b.today_chg < 0 ? '▼' : '─';
        const s     = b.today_chg >= 0 ? '+' : '';
        html += `<div class="b-chg ${cc}">${arrow} ${s}${b.today_chg.toFixed(2)}%</div>`;
      }
    } else {
      html += `<div class="b-ret" style="color:#fcd34d;font-size:14px;">明日買入</div>`;
    }

    if (b.action_tomorrow === 'SELL')
      html += `<div class="c-badge cb-sell">賣出</div>`;
    else if (b.action_tomorrow === 'BUY')
      html += `<div class="c-badge cb-buy">買入</div>`;

    el.innerHTML = html;
    grid.appendChild(el);
  });
}

// ── Modal ──
function openModal(b) {
  document.getElementById('m-id').textContent   = b.id;
  document.getElementById('m-name').textContent = b.name || '（無名稱）';

  const retEl = document.getElementById('m-ret');
  if (b.return_pct !== null && b.return_pct !== undefined) {
    retEl.textContent = (b.return_pct >= 0 ? '+' : '') + b.return_pct.toFixed(2) + '%';
    retEl.className   = 'm-ret ' + (b.return_pct > 0 ? 'pos' : b.return_pct < 0 ? 'neg' : 'zero');
  } else {
    retEl.textContent = '─';
    retEl.className   = 'm-ret zero';
  }

  const showRow = (id, val, fmt) => {
    const row = document.getElementById(id);
    if (val !== null && val !== undefined && val !== '') {
      row.style.display = 'flex';
      row.querySelector('.info-val').textContent = fmt ? fmt(val) : val;
    } else {
      row.style.display = 'none';
    }
  };

  showRow('r-chg',   b.today_chg,
    v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%');
  showRow('r-date',  b.buy_date,  null);
  showRow('r-price', b.buy_price && b.cur_price ? true : null,
    () => b.buy_price + ' ／ ' + b.cur_price);

  const aEl = document.getElementById('m-action');
  if (b.action_tomorrow === 'SELL') {
    aEl.textContent = '明日開盤賣出';
    aEl.className   = 'action-badge ab-sell';
  } else if (b.action_tomorrow === 'BUY') {
    aEl.textContent = '明日開盤買入';
    aEl.className   = 'action-badge ab-buy';
  } else {
    aEl.textContent = '繼續持有';
    aEl.className   = 'action-badge ab-hold';
  }

  document.getElementById('overlay').classList.add('open');
}

const close = () => document.getElementById('overlay').classList.remove('open');
document.getElementById('mcls').onclick = close;
document.getElementById('overlay').onclick = e => { if (e.target === e.currentTarget) close(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

renderBlocks();
</script>
