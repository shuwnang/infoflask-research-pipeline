<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型持股</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 600px at 100% -10%, rgba(56,139,253,0.06), transparent 60%),
        #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #262c36;
      box-shadow: 0 4px 16px -8px rgba(0,0,0,0.6);
      flex-wrap: wrap;
      z-index: 20;
    }
    .brand { font-size: 16px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
    .nav-link {
      color: #79b8ff; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 5px 12px; border: 1px solid #262c36; border-radius: 8px;
      white-space: nowrap; transition: all 0.15s ease;
    }
    .nav-link:hover { border-color: #388bfd; background: rgba(56,139,253,0.12); color: #a6d0ff; }
    .date-badge { font-size: 12px; color: #8b949e; white-space: nowrap; }

    /* filter buttons */
    .filter-group { display: flex; gap: 6px; align-items: center; }
    .filter-btn {
      background: #21262d; color: #8b949e;
      border: 1px solid #30363d; border-radius: 20px;
      padding: 4px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .filter-btn.act-all  { background: #1f6feb; border-color: #388bfd; color: #fff; }
    .filter-btn.act-sell { background: #374151; border-color: #6b7280; color: #9ca3af; }
    .filter-btn.act-buy  { background: #451a03; border-color: #d97706; color: #fcd34d; }
    .filter-btn.act-gold { background: #78350f; border-color: #ffd700; color: #ffd700; }

    /* stats pills */
    .stats-pills {
      margin-left: auto;
      display: flex; gap: 20px; align-items: center;
      font-size: 12px; color: #8b949e; flex-wrap: wrap;
    }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-num  { font-size: 18px; font-weight: 700; color: #f0f6fc; line-height: 1; }
    .stat-num.pos { color: #ef4444; }
    .stat-num.neg { color: #22c55e; }
    .stat-lbl  { font-size: 10px; color: #8b949e; }

    /* ── Table area ── */
    #table-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }
    #table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    #table-wrap::-webkit-scrollbar-track { background: #0d1117; }
    #table-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      position: sticky; top: 0; z-index: 10;
      background: #161b22;
      color: #8b949e; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      white-space: nowrap; text-align: center;
      cursor: pointer; user-select: none;
    }
    thead th:hover { color: #c9d1d9; }
    thead th .sort-arrow { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-arrow { opacity: 1; color: #58a6ff; }

    tbody tr {
      border-bottom: 1px solid #1c2128;
      transition: background 0.10s;
      cursor: pointer;
    }
    tbody tr.hidden-row { display: none; }

    /* ── 行左邊框顏色 ── */
    tbody tr { border-left: 3px solid transparent; }
    tbody tr.row-up      { background: #1a0a0a; border-left-color: #dc2626; }
    tbody tr.row-up:hover      { background: #250d0d; }
    tbody tr.row-down    { background: #061510; border-left-color: #16a34a; }
    tbody tr.row-down:hover    { background: #0a1f16; }
    tbody tr.row-neutral { background: #0a1525; border-left-color: #3b82f6; }
    tbody tr.row-neutral:hover { background: #0e1e33; }
    tbody tr.row-sell    { background: #111827; border-left-color: #4b5563; }
    tbody tr.row-sell:hover    { background: #1a2333; }
    tbody tr.row-buy     { background: #1c0f00; border-left-color: #d97706; }
    tbody tr.row-buy:hover     { background: #271500; }
    /* 金色外框（評分>3 且非賣出）：左邊框改金色 */
    tbody tr.row-gold-border { border-left-color: #ffd700 !important; }

    td { padding: 10px 16px; vertical-align: middle; white-space: nowrap; text-align: center; }

    /* stock id */
    .td-id { font-weight: 700; color: #f0f6fc; min-width: 72px; }
    .gold-dot {
      display: inline-block; width: 7px; height: 7px;
      background: #ffd700; border-radius: 50%;
      margin-left: 5px; vertical-align: middle;
    }

    /* stock name */
    .td-name { color: #8b949e; min-width: 110px; }

    /* return pct */
    .td-ret { font-weight: 700; font-size: 14px; min-width: 80px; }
    .ret-pos  { color: #f87171; }
    .ret-neg  { color: #4ade80; }
    .ret-zero { color: #6b7280; }

    /* today change */
    .td-chg { min-width: 80px; font-weight: 600; }
    .chg-pos { color: #fca5a5; }
    .chg-neg { color: #86efac; }
    .chg-zero { color: #6b7280; }

    /* buy date */
    .td-date { color: #6b7280; min-width: 90px; font-size: 12px; }

    /* price */
    .td-price { color: #c9d1d9; min-width: 80px; }
    .td-price span { color: #8b949e; font-size: 11px; margin: 0 3px; }

    /* action badge */
    .action-pill {
      display: inline-block;
      padding: 3px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
    }
    .ap-hold { background: #1e3a5f; color: #60a5fa; }
    .ap-sell { background: #1f2937; color: #9ca3af; border: 1px solid #4b5563; }
    .ap-buy  { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }

    /* empty */
    .empty-msg { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }

    /* ── 設計優化 polish（2026-07-08）── */
    thead th { border-bottom-color: #262c36; box-shadow: 0 6px 10px -8px rgba(0,0,0,0.75); letter-spacing: 0.06em; }
    tbody tr { transition: background 0.12s ease; }
    td { padding-top: 10px; padding-bottom: 10px; }
    ::selection { background: rgba(56,139,253,0.30); }
    .filter-btn { transition: all 0.15s ease; letter-spacing: 0.02em; }
    .filter-btn:hover { transform: translateY(-1px); }
    .search-box:focus, select:focus { box-shadow: 0 0 0 3px rgba(56,139,253,0.15); }
    .brand { letter-spacing: 0.01em; }
    #table-wrap::-webkit-scrollbar-thumb { background: #2a323d; }
    #table-wrap::-webkit-scrollbar-thumb:hover { background: #3a4453; }
  </style>
</head>
<body>

<header>
  <div class="brand">模型持股</div>
  <a href="index.html"    class="nav-link">← 評分表</a>
  <a href="realized.html" class="nav-link">已實現損益</a>
  <a href="performance.html" class="nav-link">投資績效</a>
  <div class="date-badge">持股日期：2026-07-08</div>

  <div class="filter-group">
    <button class="filter-btn act-all"  data-filter="all">全部</button>
    <button class="filter-btn"          data-filter="sell">明日賣出</button>
    <button class="filter-btn"          data-filter="buy">明日買入</button>
    <button class="filter-btn"          data-filter="gold">評分&gt;3</button>
  </div>

  <div class="stats-pills">
    <div class="stat-chip">
      <div class="stat-num" id="s-hold">—</div>
      <div class="stat-lbl">持倉支數</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="s-avg">—</div>
      <div class="stat-lbl">平均報酬</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="s-sell">—</div>
      <div class="stat-lbl">明日賣出</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="s-buy">—</div>
      <div class="stat-lbl">明日買入</div>
    </div>
  </div>
</header>

<div id="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th data-col="id">股票代號 <span class="sort-arrow">▲</span></th>
        <th class="no-sort">股票名稱</th>
        <th data-col="return_pct">累計報酬 <span class="sort-arrow">▲</span></th>
        <th data-col="today_chg">今日漲跌 <span class="sort-arrow">▲</span></th>
        <th data-col="buy_date">買入日期 <span class="sort-arrow">▲</span></th>
        <th data-col="buy_price">買入價 <span class="sort-arrow">▲</span></th>
        <th data-col="cur_price">現價 <span class="sort-arrow">▲</span></th>
        <th data-col="action_tomorrow">明日行動 <span class="sort-arrow">▲</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg" style="display:none">沒有符合條件的股票</div>
</div>

<script>
const BLOCKS = [{"id": "3234", "name": "光環", "type": "hold", "color": "up", "in_top20": false, "return_pct": 24.64, "today_chg": 4.88, "buy_date": "2026-05-28", "buy_price": 103.5, "cur_price": 129.0, "action_tomorrow": "HOLD"}, {"id": "5475", "name": "德宏", "type": "hold", "color": "up", "in_top20": true, "return_pct": -22.22, "today_chg": 3.14, "buy_date": "2026-06-01", "buy_price": 274.5, "cur_price": 213.5, "action_tomorrow": "HOLD"}, {"id": "6683", "name": "雍智科技", "type": "hold", "color": "up", "in_top20": false, "return_pct": 10.26, "today_chg": 0.3, "buy_date": "2026-06-10", "buy_price": 1510.0, "cur_price": 1665.0, "action_tomorrow": "HOLD"}, {"id": "2342", "name": "茂矽", "type": "hold", "color": "down", "in_top20": false, "return_pct": 1.92, "today_chg": -2.75, "buy_date": "2026-06-18", "buy_price": 52.0, "cur_price": 53.0, "action_tomorrow": "HOLD"}, {"id": "3362", "name": "先進光", "type": "hold", "color": "up", "in_top20": false, "return_pct": -18.45, "today_chg": 4.02, "buy_date": "2026-06-18", "buy_price": 206.0, "cur_price": 168.0, "action_tomorrow": "HOLD"}, {"id": "4760", "name": "勤凱", "type": "hold", "color": "up", "in_top20": false, "return_pct": -2.79, "today_chg": 5.57, "buy_date": "2026-06-24", "buy_price": 341.0, "cur_price": 331.5, "action_tomorrow": "HOLD"}, {"id": "3581", "name": "博磊", "type": "hold", "color": "up", "in_top20": false, "return_pct": -5.11, "today_chg": 0.78, "buy_date": "2026-06-30", "buy_price": 137.0, "cur_price": 130.0, "action_tomorrow": "HOLD"}, {"id": "3016", "name": "嘉晶", "type": "hold", "color": "up", "in_top20": false, "return_pct": -12.09, "today_chg": 1.69, "buy_date": "2026-07-01", "buy_price": 136.5, "cur_price": 120.0, "action_tomorrow": "HOLD"}, {"id": "8046", "name": "南電", "type": "hold", "color": "up", "in_top20": true, "return_pct": -7.92, "today_chg": 7.28, "buy_date": "2026-07-01", "buy_price": 1200.0, "cur_price": 1105.0, "action_tomorrow": "HOLD"}, {"id": "6182", "name": "合晶", "type": "hold", "color": "up", "in_top20": false, "return_pct": 18.52, "today_chg": 9.97, "buy_date": "2026-07-01", "buy_price": 135.0, "cur_price": 160.0, "action_tomorrow": "HOLD"}, {"id": "6451", "name": "訊芯-KY", "type": "hold", "color": "up", "in_top20": false, "return_pct": 2.54, "today_chg": 5.74, "buy_date": "2026-07-02", "buy_price": 512.0, "cur_price": 525.0, "action_tomorrow": "HOLD"}, {"id": "2464", "name": "盟立", "type": "hold", "color": "down", "in_top20": false, "return_pct": -11.39, "today_chg": -0.93, "buy_date": "2026-07-03", "buy_price": 180.0, "cur_price": 159.5, "action_tomorrow": "HOLD"}, {"id": "3374", "name": "精材", "type": "hold", "color": "up", "in_top20": true, "return_pct": 6.05, "today_chg": 10.0, "buy_date": "2026-07-03", "buy_price": 306.0, "cur_price": 324.5, "action_tomorrow": "HOLD"}, {"id": "1409", "name": "新纖", "type": "hold", "color": "down", "in_top20": false, "return_pct": 3.72, "today_chg": -7.73, "buy_date": "2026-07-03", "buy_price": 28.2, "cur_price": 29.25, "action_tomorrow": "HOLD"}, {"id": "3042", "name": "晶技", "type": "hold", "color": "down", "in_top20": false, "return_pct": -10.24, "today_chg": -1.9, "buy_date": "2026-07-03", "buy_price": 229.5, "cur_price": 206.0, "action_tomorrow": "HOLD"}, {"id": "8042", "name": "金山電", "type": "hold", "color": "down", "in_top20": true, "return_pct": -23.04, "today_chg": -5.26, "buy_date": "2026-07-06", "buy_price": 210.5, "cur_price": 162.0, "action_tomorrow": "HOLD"}, {"id": "6672", "name": "騰輝電子-KY", "type": "hold", "color": "up", "in_top20": false, "return_pct": -3.62, "today_chg": 2.0, "buy_date": "2026-07-06", "buy_price": 317.5, "cur_price": 306.0, "action_tomorrow": "HOLD"}, {"id": "2466", "name": "冠西電", "type": "hold", "color": "sell", "in_top20": false, "return_pct": 2.22, "today_chg": 4.64, "buy_date": "2026-07-06", "buy_price": 94.8, "cur_price": 96.9, "action_tomorrow": "SELL"}, {"id": "2428", "name": "興勤", "type": "hold", "color": "sell", "in_top20": false, "return_pct": -12.63, "today_chg": -2.75, "buy_date": "2026-07-07", "buy_price": 344.5, "cur_price": 301.0, "action_tomorrow": "SELL"}, {"id": "8033", "name": "雷虎", "type": "hold", "color": "up", "in_top20": true, "return_pct": 2.48, "today_chg": 9.9, "buy_date": "2026-07-07", "buy_price": 222.0, "cur_price": 227.5, "action_tomorrow": "HOLD"}, {"id": "6291", "name": "沛亨", "type": "hold", "color": "down", "in_top20": true, "return_pct": -4.94, "today_chg": -4.84, "buy_date": "2026-07-08", "buy_price": 476.0, "cur_price": 452.5, "action_tomorrow": "HOLD"}, {"id": "3189", "name": "景碩", "type": "hold", "color": "up", "in_top20": true, "return_pct": 5.74, "today_chg": 9.9, "buy_date": "2026-07-08", "buy_price": 714.0, "cur_price": 755.0, "action_tomorrow": "HOLD"}, {"id": "2327", "name": "國巨*", "type": "hold", "color": "down", "in_top20": true, "return_pct": -1.66, "today_chg": -1.55, "buy_date": "2026-07-08", "buy_price": 906.0, "cur_price": 891.0, "action_tomorrow": "HOLD"}, {"id": "2472", "name": "立隆電", "type": "hold", "color": "down", "in_top20": false, "return_pct": -5.9, "today_chg": -4.88, "buy_date": "2026-07-08", "buy_price": 373.0, "cur_price": 351.0, "action_tomorrow": "HOLD"}, {"id": "2481", "name": "強茂", "type": "hold", "color": "down", "in_top20": false, "return_pct": -7.24, "today_chg": -2.08, "buy_date": "2026-07-08", "buy_price": 228.0, "cur_price": 211.5, "action_tomorrow": "HOLD"}, {"id": "4908", "name": "前鼎", "type": "hold", "color": "up", "in_top20": false, "return_pct": 3.34, "today_chg": 4.94, "buy_date": "2026-07-08", "buy_price": 164.5, "cur_price": 170.0, "action_tomorrow": "HOLD"}, {"id": "3081", "name": "聯亞", "type": "hold", "color": "up", "in_top20": false, "return_pct": 7.99, "today_chg": 9.97, "buy_date": "2026-07-08", "buy_price": 1940.0, "cur_price": 2095.0, "action_tomorrow": "HOLD"}, {"id": "5274", "name": "信驊", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY"}, {"id": "6207", "name": "雷科", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY"}];

// ── 統計 ──
const holds  = BLOCKS.filter(b => b.type === 'hold');
const buys   = BLOCKS.filter(b => b.type === 'buy');
const sells  = BLOCKS.filter(b => b.action_tomorrow === 'SELL');
const avgRet = holds.length
  ? holds.reduce((s, b) => s + (b.return_pct || 0), 0) / holds.length : 0;

document.getElementById('s-hold').textContent = holds.length;
const avgEl = document.getElementById('s-avg');
avgEl.textContent = (avgRet >= 0 ? '+' : '') + avgRet.toFixed(2) + '%';
avgEl.className   = 'stat-num ' + (avgRet > 0 ? 'pos' : avgRet < 0 ? 'neg' : '');
document.getElementById('s-sell').textContent = sells.length;
document.getElementById('s-buy').textContent  = buys.length;

// ── sort ──
let sortCol = 'return_pct', sortDir = -1;

function sortedBlocks() {
  return [...BLOCKS].sort((a, b) => {
    if (a.type === 'buy' && b.type !== 'buy') return 1;
    if (b.type === 'buy' && a.type !== 'buy') return -1;
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = sortDir > 0 ? Infinity : -Infinity;
    if (vb === null || vb === undefined) vb = sortDir > 0 ? Infinity : -Infinity;
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
}

// ── render ──
let currentFilter = 'all';

function rowClass(b) {
  if (b.type === 'buy') return 'row-buy';
  return 'row-' + b.color;
}

function filterPasses(b) {
  if (currentFilter === 'sell') return b.action_tomorrow === 'SELL';
  if (currentFilter === 'buy')  return b.action_tomorrow === 'BUY';
  if (currentFilter === 'gold') return b.in_top20 === true;
  return true;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  sortedBlocks().forEach(b => {
    const tr = document.createElement('tr');
    let cls = rowClass(b);
    if (b.in_top20 && b.color !== 'sell') cls += ' row-gold-border';
    if (!filterPasses(b)) cls += ' hidden-row';
    tr.className = cls;

    // 累計報酬
    const retCls  = (b.return_pct === null || b.return_pct === undefined) ? 'ret-zero'
                  : b.return_pct > 0 ? 'ret-pos' : b.return_pct < 0 ? 'ret-neg' : 'ret-zero';
    const retTxt  = (b.return_pct !== null && b.return_pct !== undefined)
                  ? (b.return_pct >= 0 ? '+' : '') + b.return_pct.toFixed(2) + '%' : '—';

    // 今日漲跌
    let chgCls = 'chg-zero', chgTxt = '—';
    if (b.today_chg !== null && b.today_chg !== undefined) {
      const arrow = b.today_chg > 0 ? '▲' : b.today_chg < 0 ? '▼' : '─';
      chgCls = b.today_chg > 0.05 ? 'chg-pos' : b.today_chg < -0.05 ? 'chg-neg' : 'chg-zero';
      chgTxt = `${arrow} ${b.today_chg >= 0 ? '+' : ''}${b.today_chg.toFixed(2)}%`;
    }

    // action pill
    let pillCls = 'ap-hold', pillTxt = '繼續持有';
    if (b.action_tomorrow === 'SELL') { pillCls = 'ap-sell'; pillTxt = '明日賣出'; }
    if (b.action_tomorrow === 'BUY')  { pillCls = 'ap-buy';  pillTxt = '明日買入'; }

    // gold dot
    const goldDot = (b.in_top20 && b.color !== 'sell') ? '<span class="gold-dot"></span>' : '';

    // price cells
    const buyPriceTxt = (b.buy_price !== null && b.buy_price !== undefined && b.buy_price > 0)
                      ? b.buy_price.toFixed(2) : '—';
    const curPriceTxt = (b.cur_price !== null && b.cur_price !== undefined && b.cur_price > 0)
                      ? b.cur_price.toFixed(2) : '—';

    tr.innerHTML = `
      <td class="td-id">${b.id}${goldDot}</td>
      <td class="td-name">${b.name || '—'}</td>
      <td class="td-ret ${retCls}">${retTxt}</td>
      <td class="td-chg ${chgCls}">${chgTxt}</td>
      <td class="td-date">${b.buy_date || '—'}</td>
      <td class="td-price">${buyPriceTxt}</td>
      <td class="td-price">${curPriceTxt}</td>
      <td><span class="action-pill ${pillCls}">${pillTxt}</span></td>
    `;
    tbody.appendChild(tr);
  });

  updateEmpty();
}

function updateEmpty() {
  const vis = document.querySelectorAll('#tbody tr:not(.hidden-row)').length;
  document.getElementById('empty-msg').style.display = vis === 0 ? 'block' : 'none';
}

// ── sort headers ──
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? -sortDir : -1;
    sortCol = col;
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir > 0 ? '▲' : '▼';
    renderTable();
  });
});
document.querySelector('thead th[data-col="return_pct"]').classList.add('sorted');
document.querySelector('thead th[data-col="return_pct"] .sort-arrow').textContent = '▼';

// ── filter buttons ──
const ACT = { all: 'act-all', sell: 'act-sell', buy: 'act-buy', gold: 'act-gold' };
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn' + (b.dataset.filter === currentFilter ? ' ' + ACT[currentFilter] : '');
    });
    renderTable();
  });
});

renderTable();
</script>
</body>
</html>
