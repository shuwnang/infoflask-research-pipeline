<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型持股</title>
  <style>
    :root {
      --bg: #0A0C10;
      --surface: #12151C;
      --surface-2: #171B24;
      --surface-3: #1D2330;
      --border: #232936;
      --border-strong: #2E3646;
      --text: #E7EBF2;
      --text-2: #9AA4B2;
      --text-3: #5C6675;
      --accent: #E8C158;
      --accent-soft: rgba(232,193,88,0.10);
      --link: #6CA8FF;
      --up: #F0544C;
      --up-bright: #FF7B72;
      --up-bg: #1D0F0E;
      --dn: #3FBF7F;
      --dn-bright: #5CD99A;
      --dn-bg: #0C1B14;
      --warn: #F5A524;
      --risk: #F0544C;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 600px at 100% -10%, rgba(108,168,255,0.05), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: "Inter", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      padding: 12px 22px;
      background: rgba(10,12,16,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      z-index: 20;
    }
    .brand { font-size: 17px; font-weight: 900; color: #fff; letter-spacing: 0.08em; white-space: nowrap; }
    .brand-page { font-size: 13px; font-weight: 500; color: var(--text-3); margin-left: 2px; }
    .nav-link {
      color: var(--text-2); text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 5px 14px; border: 1px solid var(--border); border-radius: 999px;
      background: transparent;
      white-space: nowrap; transition: all 0.15s ease;
    }
    .nav-link:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
    .site-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .nav-link.active { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); pointer-events: none; }

    .date-badge { font-size: 12px; color: var(--text-3); white-space: nowrap; }

    /* filter buttons */
    .filter-group { display: flex; gap: 6px; align-items: center; }
    .filter-btn {
      background: var(--surface-2); color: var(--text-2);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--surface-3); }
    .filter-btn.act-all  { background: rgba(108,168,255,0.10); border-color: var(--link); color: var(--link); }
    .filter-btn.act-sell { background: var(--surface-3); border-color: var(--border-strong); color: var(--text-2); }
    .filter-btn.act-buy  { background: rgba(245,165,36,0.10); border-color: var(--warn); color: var(--warn); }
    .filter-btn.act-gold { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

    /* stats pills */
    .stats-pills {
      margin-left: auto;
      display: flex; gap: 20px; align-items: center;
      font-size: 12px; color: var(--text-2); flex-wrap: wrap;
    }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-num  { font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums; }
    .stat-num.pos { color: var(--up); }
    .stat-num.neg { color: var(--dn); }
    .stat-lbl  { font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; }

    /* ── Table area ── */
    #table-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      margin: 14px 16px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
    }
    #table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
    #table-wrap::-webkit-scrollbar-track { background: transparent; }
    #table-wrap::-webkit-scrollbar-thumb { background: #2A3140; border-radius: 4px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      position: sticky; top: 0; z-index: 10;
      background: var(--surface-2);
      color: var(--text-3); font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap; text-align: center;
      cursor: pointer; user-select: none;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-arrow { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-arrow { opacity: 1; color: var(--link); }

    tbody tr {
      border-bottom: 1px solid #1A1F29;
      transition: background 0.10s;
      cursor: pointer;
    }
    tbody tr.hidden-row { display: none; }

    /* ── 行左邊框顏色 ── */
    tbody tr { border-left: 3px solid transparent; }
    tbody tr.row-up      { background: var(--up-bg); border-left-color: var(--up); }
    tbody tr.row-up:hover      { background: #271513; }
    tbody tr.row-down    { background: var(--dn-bg); border-left-color: var(--dn); }
    tbody tr.row-down:hover    { background: #12241B; }
    tbody tr.row-neutral { background: #0D1420; border-left-color: var(--link); }
    tbody tr.row-neutral:hover { background: #121A28; }
    tbody tr.row-sell    { background: var(--surface); border-left-color: var(--text-3); }
    tbody tr.row-sell:hover    { background: var(--surface-3); }
    tbody tr.row-buy     { background: #1A1408; border-left-color: var(--warn); }
    tbody tr.row-buy:hover     { background: #221A0C; }
    /* 金色外框（評分>3 且非賣出）：左邊框改金色 */
    tbody tr.row-gold-border { border-left-color: var(--accent) !important; }

    td { padding: 10px 16px; vertical-align: middle; white-space: nowrap; text-align: center; font-variant-numeric: tabular-nums; }

    /* stock id */
    .td-id { font-weight: 700; min-width: 72px; }
    .yq-link { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--link); }
    .yq-link:hover { color: var(--link); }
    #trend-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(1,4,9,0.72); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    #trend-modal.open { display: flex; }
    .modal-box {
      width: min(1100px, 100%); height: min(680px, 100%);
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 24px 64px -12px rgba(0,0,0,0.9);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .modal-title .sid { color: var(--accent); }
    .modal-open-page {
      margin-left: auto; color: var(--link); text-decoration: none; font-size: 12px;
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 999px;
    }
    .modal-open-page:hover { border-color: var(--border-strong); background: var(--surface-2); }
    .modal-close {
      background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border); border-radius: 8px;
      width: 28px; height: 28px; font-size: 15px; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: var(--text); border-color: var(--border-strong); }
    .modal-box iframe { flex: 1; border: none; width: 100%; background: var(--bg); }
    .gold-dot {
      display: inline-block; width: 7px; height: 7px;
      background: var(--accent); border-radius: 50%;
      margin-left: 5px; vertical-align: middle;
    }

    /* stock name */
    .td-name { color: var(--text-2); min-width: 110px; }

    /* return pct */
    .td-ret { font-weight: 700; font-size: 14px; min-width: 80px; }
    .ret-pos  { color: var(--up-bright); }
    .ret-neg  { color: var(--dn-bright); }
    .ret-zero { color: var(--text-3); }

    /* today change */
    .td-chg { min-width: 80px; font-weight: 600; }
    .chg-pos { color: var(--up); }
    .chg-neg { color: var(--dn); }
    .chg-zero { color: var(--text-3); }

    /* buy date */
    .td-date { color: var(--text-3); min-width: 90px; font-size: 12px; }

    /* price */
    .td-price { color: var(--text); min-width: 80px; }
    .td-price span { color: var(--text-2); font-size: 11px; margin: 0 3px; }

    /* action badge */
    .action-pill {
      display: inline-block;
      padding: 3px 12px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }
    .ap-hold { background: rgba(108,168,255,0.12); color: var(--link); }
    .ap-sell { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-strong); }
    .ap-buy  { background: rgba(245,165,36,0.10); color: var(--warn); border: 1px solid rgba(245,165,36,0.5); }

    /* empty */
    .empty-msg { text-align: center; padding: 40px; color: var(--text-3); font-size: 14px; }

    /* score badge（持股評分） */
    .td-score { min-width: 68px; }
    .score-badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 3px 10px; border-radius: 999px;
      font-weight: 700; font-size: 12px; min-width: 52px;
      font-variant-numeric: tabular-nums;
    }
    .score-gold  { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(232,193,88,0.4); }
    .score-red   { background: rgba(240,84,76,0.10); color: var(--up-bright); border: 1px solid rgba(240,84,76,0.4); }
    .score-green { background: rgba(63,191,127,0.10); color: var(--dn-bright); border: 1px solid rgba(63,191,127,0.4); }
    .score-low   { background: var(--surface-2); color: var(--text-3); border: 1px solid var(--border); }

    /* ── polish ── */
    thead th { box-shadow: 0 6px 10px -8px rgba(0,0,0,0.75); }
    tbody tr { transition: background 0.12s ease; }
    td { padding-top: 10px; padding-bottom: 10px; }
    ::selection { background: rgba(108,168,255,0.28); }
    .filter-btn { transition: all 0.15s ease; letter-spacing: 0.02em; }
    .filter-btn:hover { transform: translateY(-1px); }
    .search-box:focus, select:focus { box-shadow: 0 0 0 3px rgba(108,168,255,0.15); }
    #table-wrap::-webkit-scrollbar-thumb:hover { background: #38424F; }
  </style>
</head>
<body>

<header>
  <div class="brand">INFOFLASK<span class="brand-page">｜模型持股</span></div>
  <nav class="site-nav">
    <a href="index.html" class="nav-link">首頁</a>
    <a href="scores.html" class="nav-link">評分表</a>
    <a href="holdings.html" class="nav-link active">模型持股</a>
    <a href="realized.html" class="nav-link">已實現損益</a>
    <a href="performance.html" class="nav-link">績效表</a>
    <a href="trend.html" class="nav-link">排名趨勢</a>
    <a href="market.html" class="nav-link">大盤觀測</a>
  </nav>
  <div class="date-badge">持股日期：2026-07-22</div>

  <div class="filter-group">
    <button class="filter-btn act-all"  data-filter="all">全部</button>
    <button class="filter-btn"          data-filter="sell">明日賣出</button>
    <button class="filter-btn"          data-filter="buy">明日買入</button>
    <button class="filter-btn"          data-filter="gold">評分&gt;3</button>
  </div>

  <div class="stats-pills">
    <div class="stat-chip">
      <div class="stat-num" id="s-hold">—</div>
      <div class="stat-lbl">持倉支數</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="s-avg">—</div>
      <div class="stat-lbl">平均報酬</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="s-sell">—</div>
      <div class="stat-lbl">明日賣出</div>
    </div>
    <div class="stat-chip">
      <div class="stat-num" id="s-buy">—</div>
      <div class="stat-lbl">明日買入</div>
    </div>
  </div>
</header>

<div id="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th data-col="id">股票代號 <span class="sort-arrow">▲</span></th>
        <th class="no-sort">股票名稱</th>
        <th data-col="score">評分 <span class="sort-arrow">▲</span></th>
        <th data-col="return_pct">累計報酬 <span class="sort-arrow">▲</span></th>
        <th data-col="today_chg">今日漲跌 <span class="sort-arrow">▲</span></th>
        <th data-col="buy_date">買入日期 <span class="sort-arrow">▲</span></th>
        <th data-col="buy_price">買入價 <span class="sort-arrow">▲</span></th>
        <th data-col="cur_price">現價 <span class="sort-arrow">▲</span></th>
        <th data-col="action_tomorrow">明日行動 <span class="sort-arrow">▲</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg" style="display:none">沒有符合條件的股票</div>
</div>

<div id="trend-modal">
  <div class="modal-box">
    <div class="modal-bar">
      <div class="modal-title" id="modal-title"><span class="sid"></span> 排名趨勢</div>
      <a class="modal-open-page" id="modal-open-page" href="trend.html" target="_blank">開新分頁 ↗</a>
      <button class="modal-close" id="modal-close" title="關閉">✕</button>
    </div>
    <iframe id="trend-frame" src="about:blank" loading="lazy"></iframe>
  </div>
</div>

<script>
const BLOCKS = [{"id": "4551", "mk": "TW", "name": "智伸科", "type": "hold", "color": "down", "in_top20": true, "score": 4.6, "return_pct": -17.65, "today_chg": -0.27, "buy_date": "2026-06-18", "buy_price": 221.0, "cur_price": 182.0, "action_tomorrow": "HOLD"}, {"id": "6449", "mk": "TW", "name": "鈺邦", "type": "hold", "color": "up", "in_top20": true, "score": 3.8, "return_pct": -14.98, "today_chg": 10.0, "buy_date": "2026-07-14", "buy_price": 317.0, "cur_price": 269.5, "action_tomorrow": "HOLD"}, {"id": "6683", "mk": "TWO", "name": "雍智科技", "type": "hold", "color": "up", "in_top20": true, "score": 4.5, "return_pct": -13.48, "today_chg": 4.27, "buy_date": "2026-07-16", "buy_price": 1410.0, "cur_price": 1220.0, "action_tomorrow": "HOLD"}, {"id": "3357", "mk": "TWO", "name": "臺慶科", "type": "hold", "color": "neutral", "in_top20": true, "score": 4.25, "return_pct": -1.79, "today_chg": 0.0, "buy_date": "2026-07-17", "buy_price": 223.0, "cur_price": 219.0, "action_tomorrow": "HOLD"}, {"id": "6291", "mk": "TWO", "name": "沛亨", "type": "hold", "color": "sell", "in_top20": false, "score": 1.8, "return_pct": -0.66, "today_chg": 5.15, "buy_date": "2026-07-20", "buy_price": 380.5, "cur_price": 378.0, "action_tomorrow": "SELL"}, {"id": "5475", "mk": "TWO", "name": "德宏", "type": "hold", "color": "sell", "in_top20": false, "score": 2.6, "return_pct": -2.24, "today_chg": 4.44, "buy_date": "2026-07-20", "buy_price": 156.5, "cur_price": 153.0, "action_tomorrow": "SELL"}, {"id": "4760", "mk": "TWO", "name": "勤凱", "type": "hold", "color": "up", "in_top20": true, "score": 3.15, "return_pct": 0.59, "today_chg": 3.45, "buy_date": "2026-07-20", "buy_price": 253.5, "cur_price": 255.0, "action_tomorrow": "HOLD"}, {"id": "6548", "mk": "TWO", "name": "長科*", "type": "hold", "color": "up", "in_top20": true, "score": 3.25, "return_pct": 6.85, "today_chg": 4.06, "buy_date": "2026-07-21", "buy_price": 67.2, "cur_price": 71.8, "action_tomorrow": "HOLD"}, {"id": "2492", "mk": "TW", "name": "華新科", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.75}, {"id": "2478", "mk": "TW", "name": "大毅", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.85}];

// ── 統計 ──
const holds  = BLOCKS.filter(b => b.type === 'hold');
const buys   = BLOCKS.filter(b => b.type === 'buy');
const sells  = BLOCKS.filter(b => b.action_tomorrow === 'SELL');
const avgRet = holds.length
  ? holds.reduce((s, b) => s + (b.return_pct || 0), 0) / holds.length : 0;

document.getElementById('s-hold').textContent = holds.length;
const avgEl = document.getElementById('s-avg');
avgEl.textContent = (avgRet >= 0 ? '+' : '') + avgRet.toFixed(2) + '%';
avgEl.className   = 'stat-num ' + (avgRet > 0 ? 'pos' : avgRet < 0 ? 'neg' : '');
document.getElementById('s-sell').textContent = sells.length;
document.getElementById('s-buy').textContent  = buys.length;

// ── sort ──
let sortCol = 'return_pct', sortDir = -1;

function sortedBlocks() {
  return [...BLOCKS].sort((a, b) => {
    if (a.type === 'buy' && b.type !== 'buy') return 1;
    if (b.type === 'buy' && a.type !== 'buy') return -1;
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = sortDir > 0 ? Infinity : -Infinity;
    if (vb === null || vb === undefined) vb = sortDir > 0 ? Infinity : -Infinity;
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
}

// ── render ──
let currentFilter = 'all';

function rowClass(b) {
  if (b.type === 'buy') return 'row-buy';
  return 'row-' + b.color;
}

function filterPasses(b) {
  if (currentFilter === 'sell') return b.action_tomorrow === 'SELL';
  if (currentFilter === 'buy')  return b.action_tomorrow === 'BUY';
  if (currentFilter === 'gold') return b.in_top20 === true;
  return true;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  sortedBlocks().forEach(b => {
    const tr = document.createElement('tr');
    let cls = rowClass(b);
    if (b.in_top20 && b.color !== 'sell') cls += ' row-gold-border';
    if (!filterPasses(b)) cls += ' hidden-row';
    tr.className = cls;

    // 累計報酬
    const retCls  = (b.return_pct === null || b.return_pct === undefined) ? 'ret-zero'
                  : b.return_pct > 0 ? 'ret-pos' : b.return_pct < 0 ? 'ret-neg' : 'ret-zero';
    const retTxt  = (b.return_pct !== null && b.return_pct !== undefined)
                  ? (b.return_pct >= 0 ? '+' : '') + b.return_pct.toFixed(2) + '%' : '—';

    // 今日漲跌
    let chgCls = 'chg-zero', chgTxt = '—';
    if (b.today_chg !== null && b.today_chg !== undefined) {
      const arrow = b.today_chg > 0 ? '▲' : b.today_chg < 0 ? '▼' : '─';
      chgCls = b.today_chg > 0.05 ? 'chg-pos' : b.today_chg < -0.05 ? 'chg-neg' : 'chg-zero';
      chgTxt = `${arrow} ${b.today_chg >= 0 ? '+' : ''}${b.today_chg.toFixed(2)}%`;
    }

    // action pill
    let pillCls = 'ap-hold', pillTxt = '繼續持有';
    if (b.action_tomorrow === 'SELL') { pillCls = 'ap-sell'; pillTxt = '明日賣出'; }
    if (b.action_tomorrow === 'BUY')  { pillCls = 'ap-buy';  pillTxt = '明日買入'; }

    // gold dot
    const goldDot = (b.in_top20 && b.color !== 'sell') ? '<span class="gold-dot"></span>' : '';

    // price cells
    const buyPriceTxt = (b.buy_price !== null && b.buy_price !== undefined && b.buy_price > 0)
                      ? b.buy_price.toFixed(2) : '—';
    const curPriceTxt = (b.cur_price !== null && b.cur_price !== undefined && b.cur_price > 0)
                      ? b.cur_price.toFixed(2) : '—';

    // 評分徽章
    let scoreCell = '<span class="score-badge score-low">—</span>';
    if (b.score !== null && b.score !== undefined) {
      const sc = b.score >= 3.0 ? 'score-gold' : b.score >= 1.0 ? 'score-red'
               : b.score < 0.0 ? 'score-green' : 'score-low';
      scoreCell = `<span class="score-badge ${sc}">${b.score.toFixed(2)}</span>`;
    }

    tr.innerHTML = `
      <td class="td-id"><a class="yq-link" href="https://tw.stock.yahoo.com/quote/${b.id}.${b.mk || 'TW'}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Yahoo 看盤">${b.id}</a>${goldDot}</td>
      <td class="td-name">${b.name || '—'}</td>
      <td class="td-score">${scoreCell}</td>
      <td class="td-ret ${retCls}">${retTxt}</td>
      <td class="td-chg ${chgCls}">${chgTxt}</td>
      <td class="td-date">${b.buy_date || '—'}</td>
      <td class="td-price">${buyPriceTxt}</td>
      <td class="td-price">${curPriceTxt}</td>
      <td><span class="action-pill ${pillCls}">${pillTxt}</span></td>
    `;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => openTrend(b.id, b.name));
    tbody.appendChild(tr);
  });

// ── 排名趨勢 modal（與評分表同款）──────────────────────────────────────────
const trendModal = document.getElementById('trend-modal');
const trendFrame = document.getElementById('trend-frame');
function openTrend(sid, name) {
  document.querySelector('#modal-title .sid').textContent = sid + (name ? ' ' + name : '');
  document.getElementById('modal-open-page').href = `trend.html?sid=${sid}`;
  trendFrame.src = `trend.html?sid=${sid}&embed=1`;
  trendModal.classList.add('open');
}
function closeTrend() {
  trendModal.classList.remove('open');
  trendFrame.src = 'about:blank';
}
document.getElementById('modal-close').addEventListener('click', closeTrend);
trendModal.addEventListener('click', e => { if (e.target === trendModal) closeTrend(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && trendModal.classList.contains('open')) closeTrend();
});

  updateEmpty();
}

function updateEmpty() {
  const vis = document.querySelectorAll('#tbody tr:not(.hidden-row)').length;
  document.getElementById('empty-msg').style.display = vis === 0 ? 'block' : 'none';
}

// ── sort headers ──
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? -sortDir : -1;
    sortCol = col;
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir > 0 ? '▲' : '▼';
    renderTable();
  });
});
document.querySelector('thead th[data-col="return_pct"]').classList.add('sorted');
document.querySelector('thead th[data-col="return_pct"] .sort-arrow').textContent = '▼';

// ── filter buttons ──
const ACT = { all: 'act-all', sell: 'act-sell', buy: 'act-buy', gold: 'act-gold' };
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn' + (b.dataset.filter === currentFilter ? ' ' + ACT[currentFilter] : '');
    });
    renderTable();
  });
});

renderTable();
</script>
</body>
</html>
