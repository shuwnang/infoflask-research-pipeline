<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型持股</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(1200px 600px at 100% -10%, rgba(56,139,253,0.06), transparent 60%),
        #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      font-variant-numeric: tabular-nums;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 20px;
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #262c36;
      box-shadow: 0 4px 16px -8px rgba(0,0,0,0.6);
      flex-wrap: wrap;
      z-index: 20;
    }
    .brand { font-size: 16px; font-weight: 700; color: #f0f6fc; white-space: nowrap; }
    .nav-link {
      color: #79b8ff; text-decoration: none; font-size: 13px; font-weight: 500;
      padding: 5px 12px; border: 1px solid #262c36; border-radius: 8px;
      white-space: nowrap; transition: all 0.15s ease;
    }
    .nav-link:hover { border-color: #388bfd; background: rgba(56,139,253,0.12); color: #a6d0ff; }
    .site-nav { display: flex; gap: 8px; align-items: center; }
    .nav-link.active { border-color: #ffd700; color: #ffd700; background: rgba(255,215,0,0.08); pointer-events: none; }

    .date-badge { font-size: 12px; color: #8b949e; white-space: nowrap; }

    /* filter buttons */
    .filter-group { display: flex; gap: 6px; align-items: center; }
    .filter-btn {
      background: #21262d; color: #8b949e;
      border: 1px solid #30363d; border-radius: 20px;
      padding: 4px 14px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .filter-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .filter-btn.act-all  { background: #1f6feb; border-color: #388bfd; color: #fff; }
    .filter-btn.act-sell { background: #374151; border-color: #6b7280; color: #9ca3af; }
    .filter-btn.act-buy  { background: #451a03; border-color: #d97706; color: #fcd34d; }
    .filter-btn.act-gold { background: #78350f; border-color: #ffd700; color: #ffd700; }

    /* stats pills */
    .stats-pills {
      margin-left: auto;
      display: flex; gap: 20px; align-items: center;
      font-size: 12px; color: #8b949e; flex-wrap: wrap;
    }
    .stat-chip { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .stat-num  { font-size: 18px; font-weight: 700; color: #f0f6fc; line-height: 1; }
    .stat-num.pos { color: #ef4444; }
    .stat-num.neg { color: #22c55e; }
    .stat-lbl  { font-size: 10px; color: #8b949e; }

    /* ── Table area ── */
    #table-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
    }
    #table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    #table-wrap::-webkit-scrollbar-track { background: #0d1117; }
    #table-wrap::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      position: sticky; top: 0; z-index: 10;
      background: #161b22;
      color: #8b949e; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      white-space: nowrap; text-align: center;
      cursor: pointer; user-select: none;
    }
    thead th:hover { color: #c9d1d9; }
    thead th .sort-arrow { opacity: 0.4; margin-left: 4px; }
    thead th.sorted .sort-arrow { opacity: 1; color: #58a6ff; }

    tbody tr {
      border-bottom: 1px solid #1c2128;
      transition: background 0.10s;
      cursor: pointer;
    }
    tbody tr.hidden-row { display: none; }

    /* ── 行左邊框顏色 ── */
    tbody tr { border-left: 3px solid transparent; }
    tbody tr.row-up      { background: #1a0a0a; border-left-color: #dc2626; }
    tbody tr.row-up:hover      { background: #250d0d; }
    tbody tr.row-down    { background: #061510; border-left-color: #16a34a; }
    tbody tr.row-down:hover    { background: #0a1f16; }
    tbody tr.row-neutral { background: #0a1525; border-left-color: #3b82f6; }
    tbody tr.row-neutral:hover { background: #0e1e33; }
    tbody tr.row-sell    { background: #111827; border-left-color: #4b5563; }
    tbody tr.row-sell:hover    { background: #1a2333; }
    tbody tr.row-buy     { background: #1c0f00; border-left-color: #d97706; }
    tbody tr.row-buy:hover     { background: #271500; }
    /* 金色外框（評分>3 且非賣出）：左邊框改金色 */
    tbody tr.row-gold-border { border-left-color: #ffd700 !important; }

    td { padding: 10px 16px; vertical-align: middle; white-space: nowrap; text-align: center; }

    /* stock id */
    .td-id { font-weight: 700; min-width: 72px; }
    .yq-link { color: #f0f6fc; text-decoration: none; border-bottom: 1px dotted #58a6ff; }
    .yq-link:hover { color: #58a6ff; }
    #trend-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(1,4,9,0.72); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    #trend-modal.open { display: flex; }
    .modal-box {
      width: min(1100px, 100%); height: min(680px, 100%);
      background: #0d1117; border: 1px solid #30363d; border-radius: 14px;
      box-shadow: 0 24px 64px -12px rgba(0,0,0,0.9);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; background: #161b22; border-bottom: 1px solid #262c36;
    }
    .modal-title { font-size: 14px; font-weight: 700; color: #f0f6fc; }
    .modal-title .sid { color: #ffd700; }
    .modal-open-page {
      margin-left: auto; color: #79b8ff; text-decoration: none; font-size: 12px;
      padding: 4px 10px; border: 1px solid #262c36; border-radius: 6px;
    }
    .modal-open-page:hover { border-color: #388bfd; background: rgba(56,139,253,0.12); }
    .modal-close {
      background: #21262d; color: #8b949e; border: 1px solid #30363d; border-radius: 6px;
      width: 28px; height: 28px; font-size: 15px; cursor: pointer; line-height: 1;
    }
    .modal-close:hover { color: #f0f6fc; border-color: #58a6ff; }
    .modal-box iframe { flex: 1; border: none; width: 100%; background: #0d1117; }
    .gold-dot {
      display: inline-block; width: 7px; height: 7px;
      background: #ffd700; border-radius: 50%;
      margin-left: 5px; vertical-align: middle;
    }

    /* stock name */
    .td-name { color: #8b949e; min-width: 110px; }

    /* return pct */
    .td-ret { font-weight: 700; font-size: 14px; min-width: 80px; }
    .ret-pos  { color: #f87171; }
    .ret-neg  { color: #4ade80; }
    .ret-zero { color: #6b7280; }

    /* today change */
    .td-chg { min-width: 80px; font-weight: 600; }
    .chg-pos { color: #fca5a5; }
    .chg-neg { color: #86efac; }
    .chg-zero { color: #6b7280; }

    /* buy date */
    .td-date { color: #6b7280; min-width: 90px; font-size: 12px; }

    /* price */
    .td-price { color: #c9d1d9; min-width: 80px; }
    .td-price span { color: #8b949e; font-size: 11px; margin: 0 3px; }

    /* action badge */
    .action-pill {
      display: inline-block;
      padding: 3px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
    }
    .ap-hold { background: #1e3a5f; color: #60a5fa; }
    .ap-sell { background: #1f2937; color: #9ca3af; border: 1px solid #4b5563; }
    .ap-buy  { background: #451a03; color: #fcd34d; border: 1px solid #d97706; }

    /* empty */
    .empty-msg { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }

    /* score badge（持股評分） */
    .td-score { min-width: 68px; }
    .score-badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 3px 10px; border-radius: 20px;
      font-weight: 700; font-size: 12px; min-width: 52px;
    }
    .score-gold  { background: #78350f; color: #ffd700; border: 1px solid rgba(255,215,0,0.4); }
    .score-red   { background: #3f0a0a; color: #f87171; border: 1px solid rgba(248,113,113,0.4); }
    .score-green { background: #052d1a; color: #4ade80; border: 1px solid rgba(74,222,128,0.4); }
    .score-low   { background: #1c2128; color: #6b7280; border: 1px solid #262c36; }

    /* ── 設計優化 polish（2026-07-08）── */
    thead th { border-bottom-color: #262c36; box-shadow: 0 6px 10px -8px rgba(0,0,0,0.75); letter-spacing: 0.06em; }
    tbody tr { transition: background 0.12s ease; }
    td { padding-top: 10px; padding-bottom: 10px; }
    ::selection { background: rgba(56,139,253,0.30); }
    .filter-btn { transition: all 0.15s ease; letter-spacing: 0.02em; }
    .filter-btn:hover { transform: translateY(-1px); }
    .search-box:focus, select:focus { box-shadow: 0 0 0 3px rgba(56,139,253,0.15); }
    .brand { letter-spacing: 0.01em; }
    #table-wrap::-webkit-scrollbar-thumb { background: #2a323d; }
    #table-wrap::-webkit-scrollbar-thumb:hover { background: #3a4453; }
  </style>
</head>
<body>

<header>
  <div class="brand">模型持股</div>
  <nav class="site-nav">
    <a href="index.html" class="nav-link">評分表</a>

<div id="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th data-col="id">股票代號 <span class="sort-arrow">▲</span></th>
        <th class="no-sort">股票名稱</th>

        <th data-col="today_chg">今日漲跌 <span class="sort-arrow">▲</span></th>
        <th data-col="buy_date">買入日期 <span class="sort-arrow">▲</span></th>
        <th data-col="buy_price">買入價 <span class="sort-arrow">▲</span></th>
        <th data-col="cur_price">現價 <span class="sort-arrow">▲</span></th>
        <th data-col="action_tomorrow">明日行動 <span class="sort-arrow">▲</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty-msg" style="display:none">沒有符合條件的股票</div>
</div>

<div id="trend-modal">
  <div class="modal-box">
    <div class="modal-bar">
      <div class="modal-title" id="modal-title"><span class="sid"></span> 排名趨勢</div>
      <a class="modal-open-page" id="modal-open-page" href="trend.html" target="_blank">開新分頁 ↗</a>
      <button class="modal-close" id="modal-close" title="關閉">✕</button>
    </div>
    <iframe id="trend-frame" src="about:blank" loading="lazy"></iframe>
  </div>
</div>

<script>
const BLOCKS = [{"id": "6830", "mk": "TW", "name": "汎銓", "type": "hold", "color": "sell", "in_top20": false, "score": 2.6, "return_pct": -13.72, "today_chg": 2.9, "buy_date": "2026-07-02", "buy_price": 452.0, "cur_price": 390.0, "action_tomorrow": "SELL"}, {"id": "8996", "mk": "TW", "name": "高力", "type": "hold", "color": "up", "in_top20": true, "score": 3.9, "return_pct": -15.66, "today_chg": 0.85, "buy_date": "2026-07-03", "buy_price": 1405.0, "cur_price": 1185.0, "action_tomorrow": "HOLD"}, {"id": "4971", "mk": "TWO", "name": "IET-KY", "type": "hold", "color": "sell", "in_top20": false, "score": 2.4, "return_pct": -0.35, "today_chg": 6.66, "buy_date": "2026-07-13", "buy_price": 426.0, "cur_price": 424.5, "action_tomorrow": "SELL"}, {"id": "8043", "mk": "TWO", "name": "蜜望實", "type": "hold", "color": "up", "in_top20": true, "score": 4.05, "return_pct": -11.46, "today_chg": 0.65, "buy_date": "2026-07-13", "buy_price": 174.5, "cur_price": 154.5, "action_tomorrow": "HOLD"}, {"id": "2327", "mk": "TW", "name": "國巨*", "type": "hold", "color": "up", "in_top20": true, "score": 4.2, "return_pct": 0.0, "today_chg": 2.57, "buy_date": "2026-07-14", "buy_price": 798.0, "cur_price": 798.0, "action_tomorrow": "HOLD"}, {"id": "6442", "mk": "TW", "name": "光聖", "type": "hold", "color": "sell", "in_top20": false, "score": 2.75, "return_pct": 3.62, "today_chg": 8.75, "buy_date": "2026-07-14", "buy_price": 1380.0, "cur_price": 1430.0, "action_tomorrow": "SELL"}, {"id": "6147", "mk": "TWO", "name": "頎邦", "type": "hold", "color": "sell", "in_top20": false, "score": 2.05, "return_pct": 5.14, "today_chg": 9.95, "buy_date": "2026-07-15", "buy_price": 194.5, "cur_price": 204.5, "action_tomorrow": "SELL"}, {"id": "4991", "mk": "TWO", "name": "環宇-KY", "type": "hold", "color": "up", "in_top20": true, "score": 3.6, "return_pct": -2.18, "today_chg": 2.16, "buy_date": "2026-07-15", "buy_price": 435.5, "cur_price": 426.0, "action_tomorrow": "HOLD"}, {"id": "4760", "mk": "TWO", "name": "勤凱", "type": "hold", "color": "sell", "in_top20": true, "score": 3.15, "return_pct": -1.39, "today_chg": -0.52, "buy_date": "2026-07-15", "buy_price": 288.5, "cur_price": 284.5, "action_tomorrow": "SELL"}, {"id": "6291", "mk": "TWO", "name": "沛亨", "type": "hold", "color": "sell", "in_top20": false, "score": 2.95, "return_pct": -3.29, "today_chg": -0.47, "buy_date": "2026-07-15", "buy_price": 440.5, "cur_price": 426.0, "action_tomorrow": "SELL"}, {"id": "8042", "mk": "TWO", "name": "金山電", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.5}, {"id": "3236", "mk": "TWO", "name": "千如", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.65}, {"id": "6213", "mk": "TW", "name": "聯茂", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.4}, {"id": "2375", "mk": "TW", "name": "凱美", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.45}, {"id": "6449", "mk": "TW", "name": "鈺邦", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.7}, {"id": "2481", "mk": "TW", "name": "強茂", "type": "buy", "color": "buy", "return_pct": null, "today_chg": null, "buy_date": null, "buy_price": null, "cur_price": null, "action_tomorrow": "BUY", "score": 4.75}];

// ── 統計 ──
const holds  = BLOCKS.filter(b => b.type === 'hold');
const buys   = BLOCKS.filter(b => b.type === 'buy');
const sells  = BLOCKS.filter(b => b.action_tomorrow === 'SELL');
const avgRet = holds.length
  ? holds.reduce((s, b) => s + (b.return_pct || 0), 0) / holds.length : 0;

document.getElementById('s-hold').textContent = holds.length;
const avgEl = document.getElementById('s-avg');
avgEl.textContent = (avgRet >= 0 ? '+' : '') + avgRet.toFixed(2) + '%';
avgEl.className   = 'stat-num ' + (avgRet > 0 ? 'pos' : avgRet < 0 ? 'neg' : '');
document.getElementById('s-sell').textContent = sells.length;
document.getElementById('s-buy').textContent  = buys.length;

// ── sort ──
let sortCol = 'return_pct', sortDir = -1;

function sortedBlocks() {
  return [...BLOCKS].sort((a, b) => {
    if (a.type === 'buy' && b.type !== 'buy') return 1;
    if (b.type === 'buy' && a.type !== 'buy') return -1;
    let va = a[sortCol], vb = b[sortCol];
    if (va === null || va === undefined) va = sortDir > 0 ? Infinity : -Infinity;
    if (vb === null || vb === undefined) vb = sortDir > 0 ? Infinity : -Infinity;
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
}

// ── render ──
let currentFilter = 'all';

function rowClass(b) {
  if (b.type === 'buy') return 'row-buy';
  return 'row-' + b.color;
}

function filterPasses(b) {
  if (currentFilter === 'sell') return b.action_tomorrow === 'SELL';
  if (currentFilter === 'buy')  return b.action_tomorrow === 'BUY';
  if (currentFilter === 'gold') return b.in_top20 === true;
  return true;
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  sortedBlocks().forEach(b => {
    const tr = document.createElement('tr');
    let cls = rowClass(b);
    if (b.in_top20 && b.color !== 'sell') cls += ' row-gold-border';
    if (!filterPasses(b)) cls += ' hidden-row';
    tr.className = cls;

    // 累計報酬
    const retCls  = (b.return_pct === null || b.return_pct === undefined) ? 'ret-zero'
                  : b.return_pct > 0 ? 'ret-pos' : b.return_pct < 0 ? 'ret-neg' : 'ret-zero';
    const retTxt  = (b.return_pct !== null && b.return_pct !== undefined)
                  ? (b.return_pct >= 0 ? '+' : '') + b.return_pct.toFixed(2) + '%' : '—';

    // 今日漲跌
    let chgCls = 'chg-zero', chgTxt = '—';
    if (b.today_chg !== null && b.today_chg !== undefined) {
      const arrow = b.today_chg > 0 ? '▲' : b.today_chg < 0 ? '▼' : '─';
      chgCls = b.today_chg > 0.05 ? 'chg-pos' : b.today_chg < -0.05 ? 'chg-neg' : 'chg-zero';
      chgTxt = `${arrow} ${b.today_chg >= 0 ? '+' : ''}${b.today_chg.toFixed(2)}%`;
    }

    // action pill
    let pillCls = 'ap-hold', pillTxt = '繼續持有';
    if (b.action_tomorrow === 'SELL') { pillCls = 'ap-sell'; pillTxt = '明日賣出'; }
    if (b.action_tomorrow === 'BUY')  { pillCls = 'ap-buy';  pillTxt = '明日買入'; }

    // gold dot
    const goldDot = (b.in_top20 && b.color !== 'sell') ? '<span class="gold-dot"></span>' : '';

    // price cells
    const buyPriceTxt = (b.buy_price !== null && b.buy_price !== undefined && b.buy_price > 0)
                      ? b.buy_price.toFixed(2) : '—';
    const curPriceTxt = (b.cur_price !== null && b.cur_price !== undefined && b.cur_price > 0)
                      ? b.cur_price.toFixed(2) : '—';

    // 評分徽章
    let scoreCell = '<span class="score-badge score-low">—</span>';
    if (b.score !== null && b.score !== undefined) {
      const sc = b.score >= 3.0 ? 'score-gold' : b.score >= 1.0 ? 'score-red'
               : b.score < 0.0 ? 'score-green' : 'score-low';
      scoreCell = `<span class="score-badge ${sc}">${b.score.toFixed(2)}</span>`;
    }

    tr.innerHTML = `
      <td class="td-id"><a class="yq-link" href="https://tw.stock.yahoo.com/quote/${b.id}.${b.mk || 'TW'}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Yahoo 看盤">${b.id}</a>${goldDot}</td>
      <td class="td-name">${b.name || '—'}</td>
      <td class="td-score">${scoreCell}</td>
      <td class="td-ret ${retCls}">${retTxt}</td>
      <td class="td-chg ${chgCls}">${chgTxt}</td>
      <td class="td-date">${b.buy_date || '—'}</td>
      <td class="td-price">${buyPriceTxt}</td>
      <td class="td-price">${curPriceTxt}</td>
      <td><span class="action-pill ${pillCls}">${pillTxt}</span></td>
    `;
    tr.style.cursor = 'pointer';
    tr.addEventListener('click', () => openTrend(b.id, b.name));
    tbody.appendChild(tr);
  });

// ── 排名趨勢 modal（與評分表同款）──────────────────────────────────────────
const trendModal = document.getElementById('trend-modal');
const trendFrame = document.getElementById('trend-frame');
function openTrend(sid, name) {
  document.querySelector('#modal-title .sid').textContent = sid + (name ? ' ' + name : '');
  document.getElementById('modal-open-page').href = `trend.html?sid=${sid}`;
  trendFrame.src = `trend.html?sid=${sid}&embed=1`;
  trendModal.classList.add('open');
}
function closeTrend() {
  trendModal.classList.remove('open');
  trendFrame.src = 'about:blank';
}
document.getElementById('modal-close').addEventListener('click', closeTrend);
trendModal.addEventListener('click', e => { if (e.target === trendModal) closeTrend(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && trendModal.classList.contains('open')) closeTrend();
});

  updateEmpty();
}

function updateEmpty() {
  const vis = document.querySelectorAll('#tbody tr:not(.hidden-row)').length;
  document.getElementById('empty-msg').style.display = vis === 0 ? 'block' : 'none';
}

// ── sort headers ──
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    sortDir = sortCol === col ? -sortDir : -1;
    sortCol = col;
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sorted'));
    th.classList.add('sorted');
    th.querySelector('.sort-arrow').textContent = sortDir > 0 ? '▲' : '▼';
    renderTable();
  });
});
document.querySelector('thead th[data-col="return_pct"]').classList.add('sorted');
document.querySelector('thead th[data-col="return_pct"] .sort-arrow').textContent = '▼';

// ── filter buttons ──
const ACT = { all: 'act-all', sell: 'act-sell', buy: 'act-buy', gold: 'act-gold' };
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn' + (b.dataset.filter === currentFilter ? ' ' + ACT[currentFilter] : '');
    });
    renderTable();
  });
});

renderTable();
</script>
</body>
</html>
